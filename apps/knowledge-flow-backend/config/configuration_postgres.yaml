#
# Persistent configuration WITHOUT OpenSearch:
#   - PostgreSQL (+ pgvector) for metadata, tags, resources and vectors.
#   - Object storage is switchable: this file ships with native Google Cloud
#     Storage (GCS) active for both the content store and the virtual filesystem.
#     MinIO/S3 and local-disk alternatives are shown commented below.
#
# GCS authentication uses Application Default Credentials (ADC) / Workload
# Identity — NO service-account JSON key is committed or mounted. See
# docs/swift/platform/DEPLOYMENT_GUIDE_GKE.md.

app:
  name: "Knowledge Flow Backend"
  base_url: "/knowledge-flow/v1"
  address: "0.0.0.0"
  port: 8111
  log_level: info
  reload: false
  reload_dir: "."

observability:
  kpi:
    prometheus:
      port: 9111

processing:
  default_profile: fast
  profiles:
    fast:
      use_gpu: false
      generate_summary: false
      input_activity_timeout: 90m
      activity_heartbeat_timeout: 5m
      retry_initial_interval: 5s
      retry_backoff_coefficient: 2.0
      retry_maximum_interval: 20s
      retry_maximum_attempts: 3
      retry_non_retryable_error_types: []
      process_images: false
      text_splitter:
        chunk_size: 1500
        chunk_overlap: 150
        preserve_tables: true
      pdf:
        extractor: pymupdf
        do_ocr: false
      input_processors:
        - suffix: ".pdf"
          class_path: knowledge_flow_backend.core.processors.input.lightweight_markdown_processor.lite_pdf_to_md_processor.LitePdfMarkdownProcessor
        - suffix: ".docx"
          class_path: knowledge_flow_backend.core.processors.input.docx_markdown_processor.docx_markdown_processor.DocxMarkdownProcessor
        - suffix: ".doc"
          class_path: knowledge_flow_backend.core.processors.input.doc_markdown_processor.doc_markdown_processor.DocMarkdownProcessor
        - suffix: ".odt"
          class_path: knowledge_flow_backend.core.processors.input.odt_markdown_processor.odt_markdown_processor.OdtMarkdownProcessor
        - suffix: ".pptx"
          class_path: knowledge_flow_backend.core.processors.input.pptx_markdown_processor.pptx_markdown_processor.PptxMarkdownProcessor
        - suffix: ".ppt"
          class_path: knowledge_flow_backend.core.processors.input.ppt_markdown_processor.ppt_markdown_processor.PptMarkdownProcessor
        - suffix: ".csv"
          class_path: knowledge_flow_backend.core.processors.input.csv_tabular_processor.csv_tabular_processor.CsvTabularProcessor
        - suffix: ".txt"
          class_path: knowledge_flow_backend.core.processors.input.text_markdown_processor.text_markdown_processor.TextMarkdownProcessor
        - suffix: ".md"
          class_path: knowledge_flow_backend.core.processors.input.markdown_markdown_processor.markdown_markdown_processor.MarkdownMarkdownProcessor
        - suffix: ".jsonl"
          class_path: knowledge_flow_backend.core.processors.input.jsonl.jsonl_markdown_processor.JsonlMarkdownProcessor
        - suffix: ".png"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".jpg"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".jpeg"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".gif"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".bmp"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".svg"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".webp"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".ico"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
    medium:
      use_gpu: false
      generate_summary: false
      input_activity_timeout: 2h
      activity_heartbeat_timeout: 5m
      retry_initial_interval: 20s
      retry_backoff_coefficient: 2.0
      retry_maximum_interval: 2m
      retry_maximum_attempts: 5
      retry_non_retryable_error_types: []
      process_images: false
      text_splitter:
        chunk_size: 1500
        chunk_overlap: 150
        preserve_tables: true
      pdf:
        extractor: docling
        do_ocr: true
      input_processors:
        - suffix: ".pdf"
          class_path: knowledge_flow_backend.core.processors.input.pdf_markdown_processor.pdf_markdown_processor.PdfMarkdownProcessor
        - suffix: ".docx"
          class_path: knowledge_flow_backend.core.processors.input.docx_markdown_processor.docx_markdown_processor.DocxMarkdownProcessor
        - suffix: ".doc"
          class_path: knowledge_flow_backend.core.processors.input.doc_markdown_processor.doc_markdown_processor.DocMarkdownProcessor
        - suffix: ".odt"
          class_path: knowledge_flow_backend.core.processors.input.odt_markdown_processor.odt_markdown_processor.OdtMarkdownProcessor
        - suffix: ".pptx"
          class_path: knowledge_flow_backend.core.processors.input.pptx_markdown_processor.pptx_markdown_processor.PptxMarkdownProcessor
        - suffix: ".ppt"
          class_path: knowledge_flow_backend.core.processors.input.ppt_markdown_processor.ppt_markdown_processor.PptMarkdownProcessor
        - suffix: ".csv"
          class_path: knowledge_flow_backend.core.processors.input.csv_tabular_processor.csv_tabular_processor.CsvTabularProcessor
        - suffix: ".txt"
          class_path: knowledge_flow_backend.core.processors.input.text_markdown_processor.text_markdown_processor.TextMarkdownProcessor
        - suffix: ".md"
          class_path: knowledge_flow_backend.core.processors.input.markdown_markdown_processor.markdown_markdown_processor.MarkdownMarkdownProcessor
        - suffix: ".jsonl"
          class_path: knowledge_flow_backend.core.processors.input.jsonl.jsonl_markdown_processor.JsonlMarkdownProcessor
        - suffix: ".png"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".jpg"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".jpeg"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".gif"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".bmp"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".svg"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".webp"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".ico"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
    rich:
      use_gpu: false
      generate_summary: false
      input_activity_timeout: 2h
      activity_heartbeat_timeout: 5m
      retry_initial_interval: 30s
      retry_backoff_coefficient: 2.0
      retry_maximum_interval: 5m
      retry_maximum_attempts: 7
      retry_non_retryable_error_types: []
      process_images: true
      text_splitter:
        chunk_size: 1500
        chunk_overlap: 150
        preserve_tables: true
      pdf:
        extractor: docling
        do_ocr: true
      input_processors:
        - suffix: ".pdf"
          class_path: knowledge_flow_backend.core.processors.input.pdf_markdown_processor.pdf_markdown_processor.PdfMarkdownProcessor
        - suffix: ".docx"
          class_path: knowledge_flow_backend.core.processors.input.docx_markdown_processor.docx_markdown_processor.DocxMarkdownProcessor
        - suffix: ".doc"
          class_path: knowledge_flow_backend.core.processors.input.doc_markdown_processor.doc_markdown_processor.DocMarkdownProcessor
        - suffix: ".odt"
          class_path: knowledge_flow_backend.core.processors.input.odt_markdown_processor.odt_markdown_processor.OdtMarkdownProcessor
        - suffix: ".pptx"
          class_path: knowledge_flow_backend.core.processors.input.pptx_markdown_processor.pptx_markdown_processor.PptxMarkdownProcessor
        - suffix: ".ppt"
          class_path: knowledge_flow_backend.core.processors.input.ppt_markdown_processor.ppt_markdown_processor.PptMarkdownProcessor
        - suffix: ".csv"
          class_path: knowledge_flow_backend.core.processors.input.csv_tabular_processor.csv_tabular_processor.CsvTabularProcessor
        - suffix: ".txt"
          class_path: knowledge_flow_backend.core.processors.input.text_markdown_processor.text_markdown_processor.TextMarkdownProcessor
        - suffix: ".md"
          class_path: knowledge_flow_backend.core.processors.input.markdown_markdown_processor.markdown_markdown_processor.MarkdownMarkdownProcessor
        - suffix: ".jsonl"
          class_path: knowledge_flow_backend.core.processors.input.jsonl.jsonl_markdown_processor.JsonlMarkdownProcessor
        - suffix: ".png"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".jpg"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".jpeg"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".gif"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".bmp"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".svg"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".webp"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".ico"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor

security:
  m2m:
    enabled: true
    client_id: "knowledge-flow"
    realm_url: "http://app-keycloak:8080/realms/app"
    secret_env_var: KEYCLOAK_KNOWLEDGE_FLOW_CLIENT_SECRET # pragma: allowlist secret
  user:
    enabled: true
    client_id: "app"
    realm_url: "http://app-keycloak:8080/realms/app"
  authorized_origins:
    - "http://localhost:5173"
  rebac:
    enabled: true
    type: openfga
    api_url: "http://localhost:9080"

scheduler:
  enabled: true
  backend: "temporal"
  temporal:
    host: "localhost:7233"
    namespace: "default"
    task_queue: "ingestion"
    workflow_id_prefix: "pipeline"
    connect_timeout_seconds: 5
    ingestion_workflow_parallelism: 3
    ingestion_max_concurrent_workflow_tasks: 3
    ingestion_max_concurrent_activities: 3

# ---------------------------------------------------------------------------
# Content store — knowledge ingestion document + object content.
# Active backend: native GCS via ADC / Workload Identity (no JSON key).
# The bucket_name is suffixed at runtime with -documents / -objects / -files;
# all three buckets must already exist.
# ---------------------------------------------------------------------------
content_storage:
  type: gcs
  bucket_name: "fredlab-content" # → fredlab-content-documents / -objects / -files
  project_id: "" # optional; inferred from ADC when empty
  # Required for GCS: signs V4 signed URLs for tabular Parquet reads via IAM
  # signBlob (keyless). Startup fails clearly if unset. The GSA needs
  # iam.serviceAccounts.signBlob on this account; it needs storage.objects.get
  # on the -objects bucket. See docs/swift/platform/DEPLOYMENT_GUIDE_GKE.md §3.2.
  signing_service_account_email: "fred-storage@fredlab.iam.gserviceaccount.com"
# content_storage:           # --- MinIO / S3 alternative ---
#   type: minio
#   endpoint: http://localhost:8333
#   access_key: "admin"
#   bucket_name: "knowledge-flow-content"
#   secure: false
# content_storage:           # --- local-disk alternative ---
#   type: local
#   root_path: ~/.fred/knowledge-flow/content-store

document_sources:
  fred:
    type: push
    description: "Documents manually uploaded by users"

# Models: Vertex AI is the natural GCP-native choice (authenticates via ADC).
# Keep only non-secret settings here; secrets stay in .env.
chat_model:
  provider: vertex-ai-model-garden
  name: "mistral-small-2503"
  settings:
    model_family: mistral
    project: your-gcp-project-id
    location: europe-west4
    temperature: 0
    max_retries: 2
    request_timeout: 90
embedding_model:
  provider: vertex-ai
  name: text-embedding-005
  settings:
    project: your-gcp-project-id
    location: europe-west4
    max_retries: 2
vision_model:
  provider: vertex-ai
  name: gemini-2.5-flash
  settings:
    project: your-gcp-project-id
    location: europe-west4
    temperature: 0
    max_retries: 2
    request_timeout: 90

crossencoder_model:
  name: cross-encoder/ms-marco-MiniLM-L-12-v2
  settings:
    online: true
    local_path: ~/.cache/huggingface/hub

storage:
  postgres:
    host: localhost
    port: 5432
    database: fred
    username: fred
    pool_size: 2
    max_overflow: 0
    pool_timeout: 30
    pool_recycle: 1800
    pool_pre_ping: true
  resource_store:
    type: "postgres"
  tag_store:
    type: "postgres"
  metadata_store:
    type: "postgres"
  log_store:
    type: "in_memory"
  tabular_store:
    artifacts_prefix: "tabular/datasets"
    format: "parquet"
    compression: "snappy"
    query:
      engine: "duckdb"
      # NOTE: tabular SQL preview uses backend-internal signed URLs. On GCS,
      # this currently fails as an explicit unsupported operation until
      # GCS-TABULAR-SIGNED-URL-RFC lands via iam.serviceAccounts.signBlob.
      access_mode: "presigned_url"
      internal_presigned_ttl_seconds: 3600
      default_max_rows: 200
      max_rows: 1000
  vector_store:
    type: pgvector
    collection_name: fred_chunks

mcp:
  reports_enabled: true
  kpi_enabled: true
  tabular_enabled: true
  statistic_enabled: true
  text_enabled: true
  templates_enabled: true
  resources_enabled: true
  opensearch_ops_enabled: false
  prometheus_ops_enabled: false
  neo4j_enabled: false
  filesystem_enabled: true
  filesystem_read_default_limit: 100
  filesystem_read_max_limit: 500
  filesystem_read_default_max_chars: 20000
  filesystem_read_absolute_max_chars: 50000

# ---------------------------------------------------------------------------
# Virtual filesystem (unified VFS). Active backend: native GCS via ADC.
# An optional `prefix` lets several logical roots share one bucket.
# ---------------------------------------------------------------------------
filesystem:
  type: gcs
  bucket_name: "fredlab-fs"
  prefix: "" # optional, default ""
  project_id: "" # optional; inferred from ADC when empty
# filesystem:                # --- MinIO / S3 alternative ---
#   type: minio
#   endpoint: http://localhost:8333
#   access_key: admin
#   bucket_name: filesystem
#   secure: false
# filesystem:                # --- local-disk alternative ---
#   type: local
#   root: ~/.fred/knowledge-flow/filesystem/
