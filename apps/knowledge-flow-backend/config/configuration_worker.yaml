security:
  m2m:
    enabled: false
    client_id: "knowledge-flow"
    realm_url: "http://app-keycloak:8080/realms/app"
  user:
    enabled: false
    client_id: "app"
    realm_url: "http://app-keycloak:8080/realms/app"
  authorized_origins:
    - "http://localhost:5173"
  rebac:
    enabled: false
    type: openfga
    api_url: "http://localhost:9080"
scheduler:
  enabled: true
  backend: "temporal"
  temporal:
    host: "localhost:7233"
    namespace: "default"
    task_queue: "ingestion"
    workflow_id_prefix: "pipeline"
    connect_timeout_seconds: 5
    ingestion_workflow_parallelism: 3
    ingestion_max_concurrent_workflow_tasks: 3
    ingestion_max_concurrent_activities: 3
content_storage:
  type: minio
  endpoint: http://localhost:8333
  access_key: "admin"
  bucket_name: "knowledge-flow-content"
  secure: false
document_sources:
  fred:
    type: push
    description: "Documents manually uploaded by users"
chat_model:
  provider: openai
  name: mistral-medium-2508 # any chat-capable model (gpt-4o, gpt-4o-mini, gpt-4.1, etc.)
  settings:
    base_url: https://api.mistral.ai/v1
embedding_model:
  provider: ollama
  name: embeddinggemma:300m-qat-q8_0
  settings:
    base_url: http://localhost:11434
    max_retries: 0
vision_model:
  provider: openai
  name: mistral-medium-latest # or gpt-4o if you want higher fidelity
  settings:
    base_url: https://api.mistral.ai/v1
# ocr_model:
#   provider: openai
#   name: mistral-ocr-latest
#   settings:
#     base_url: https://api.mistral.ai/v1
#     request_timeout: 300
#     signed_url_expiry_hours: 1
crossencoder_model:
  name: cross-encoder/ms-marco-MiniLM-L-12-v2
  settings:
    online: true
    local_path: ~/.cache/huggingface/hub
    max_retries: 0
    timeout:
      connect: 10.0
      read: 120.0
    http_client_limits:
      max_connections: 500
      max_keepalive_connections: 0
      keepalive_expiry_seconds: 10
storage:
  postgres:
    host: localhost
    port: 5432
    database: fred
    username: fred
    pool_size: 2
    max_overflow: 0
    pool_timeout: 30
    pool_recycle: 1800
    pool_pre_ping: true
  opensearch:
    host: https://localhost:9200
    secure: true
    verify_certs: false
    username: admin
  # clickhouse:
  #   host: localhost
  #   port: 8123
  #   database: fred
  #   username: fred
  #   secure: false
  #   verify: true

  resource_store:
    type: "postgres"
  tag_store:
    type: "postgres"
  metadata_store:
    type: "postgres"
  tabular_store:
    artifacts_prefix: "tabular/datasets"
    format: "parquet"
    compression: "snappy"
    query:
      engine: "duckdb"
      access_mode: "presigned_url"
      internal_presigned_ttl_seconds: 3600
      default_max_rows: 200
      max_rows: 1000
  vector_store:
    type: opensearch
    index: vector-index-mistral
    # type: clickhouse
    # table: fred_vectors
    # bulk_size: 1000
    # Default bulk size for vector insertions is 500. Increase if you have
    # enough memory and want faster ingestion. Or if run into ingestion errors
    # while ingesting large documents.
    bulk_size: 1000
  log_store:
    type: "in_memory"
# integrations:
#   prometheus:
#     base_url: http://prometheus:9090
#     verify_ssl: false
#     timeout_seconds: 15.0
#     username: admin  # optional; defaults to admin, password comes from PROMETHEUS_PASSWORD
mcp:
  reports_enabled: true
  kpi_enabled: true
  tabular_enabled: true
  statistic_enabled: true
  text_enabled: true
  templates_enabled: true
  resources_enabled: true
  opensearch_ops_enabled: true
  prometheus_ops_enabled: false
  neo4j_enabled: false
  filesystem_enabled: true
  filesystem_read_default_limit: 100
  filesystem_read_max_limit: 500
  filesystem_read_default_max_chars: 20000
  filesystem_read_absolute_max_chars: 50000
filesystem:
  type: minio
  endpoint: http://localhost:8333
  access_key: admin
  bucket_name: filesystem
  secure: false
# Workspace storage layout (paths inside the bucket/filesystem)
