app:
  name: "Knowledge Flow Backend"
  base_url: "/knowledge-flow/v1"
  address: "127.0.0.1"
  port: 8112
  log_level: "info"
  reload: false
  reload_dir: "."

observability:
  kpi:
    process_metrics_interval_sec: 0
    prometheus:
      port: 9112

processing:
  # path_base_model: "."
  path_base_model: "/app" # Use for docker
  default_profile: fast
  profiles:
    fast:
      use_gpu: false
      generate_summary: false
      input_activity_timeout: 1h
      activity_heartbeat_timeout: 5m
      retry_initial_interval: 5s
      retry_backoff_coefficient: 2.0
      retry_maximum_interval: 20s
      retry_maximum_attempts: 3
      retry_non_retryable_error_types: []
      process_images: false
      text_splitter:
        chunk_size: 1500
        chunk_overlap: 150
        preserve_tables: true
      pdf:
        do_ocr: false
      input_processors:
        - suffix: ".pdf"
          class_path: knowledge_flow_backend.core.processors.input.lightweight_markdown_processor.lite2_pdf_to_md_processor.LitePdfMarkdownProcessor
        - suffix: ".docx"
          class_path: knowledge_flow_backend.core.processors.input.docx_markdown_processor.docx_markdown_processor.DocxMarkdownProcessor
        - suffix: ".pptx"
          class_path: knowledge_flow_backend.core.processors.input.pptx_markdown_processor.pptx_markdown_processor.PptxMarkdownProcessor
        - suffix: ".csv"
          class_path: knowledge_flow_backend.core.processors.input.csv_tabular_processor.csv_tabular_processor.CsvTabularProcessor
        - suffix: ".txt"
          class_path: knowledge_flow_backend.core.processors.input.text_markdown_processor.text_markdown_processor.TextMarkdownProcessor
        - suffix: ".md"
          class_path: knowledge_flow_backend.core.processors.input.markdown_markdown_processor.markdown_markdown_processor.MarkdownMarkdownProcessor
        - suffix: ".png"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".jpg"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".jpeg"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".gif"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".bmp"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".svg"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".webp"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".ico"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".jsonl"
          class_path: knowledge_flow_backend.core.processors.input.jsonl.jsonl_markdown_processor.JsonlMarkdownProcessor
    medium:
      use_gpu: false
      generate_summary: false
      process_images: false
      input_activity_timeout: 1h
      activity_heartbeat_timeout: 5m
      retry_initial_interval: 20s
      retry_backoff_coefficient: 2.0
      retry_maximum_interval: 2m
      retry_maximum_attempts: 5
      retry_non_retryable_error_types: []
      text_splitter:
        chunk_size: 1500
        chunk_overlap: 150
        preserve_tables: true
      pdf:
        extractor: docling
        do_ocr: true
      input_processors:
        - suffix: ".pdf"
          class_path: knowledge_flow_backend.core.processors.input.pdf_markdown_processor.pdf_markdown_processor.PdfMarkdownProcessor
        - suffix: ".docx"
          class_path: knowledge_flow_backend.core.processors.input.docx_markdown_processor.docx_markdown_processor.DocxMarkdownProcessor
        - suffix: ".pptx"
          class_path: knowledge_flow_backend.core.processors.input.pptx_markdown_processor.pptx_markdown_processor.PptxMarkdownProcessor
        - suffix: ".csv"
          class_path: knowledge_flow_backend.core.processors.input.csv_tabular_processor.csv_tabular_processor.CsvTabularProcessor
        - suffix: ".txt"
          class_path: knowledge_flow_backend.core.processors.input.text_markdown_processor.text_markdown_processor.TextMarkdownProcessor
        - suffix: ".md"
          class_path: knowledge_flow_backend.core.processors.input.markdown_markdown_processor.markdown_markdown_processor.MarkdownMarkdownProcessor
        - suffix: ".png"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".jpg"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".jpeg"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".gif"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".bmp"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".svg"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".webp"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".ico"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".jsonl"
          class_path: knowledge_flow_backend.core.processors.input.jsonl.jsonl_markdown_processor.JsonlMarkdownProcessor
    rich:
      use_gpu: false
      generate_summary: false
      process_images: true
      input_activity_timeout: 1h
      activity_heartbeat_timeout: 5m
      retry_initial_interval: 30s
      retry_backoff_coefficient: 2.0
      retry_maximum_interval: 5m
      retry_maximum_attempts: 7
      retry_non_retryable_error_types: []
      text_splitter:
        chunk_size: 1500
        chunk_overlap: 150
        preserve_tables: true
      pdf:
        extractor: docling
        do_ocr: true
      input_processors:
        - suffix: ".pdf"
          class_path: knowledge_flow_backend.core.processors.input.pdf_markdown_processor.pdf_markdown_processor.PdfMarkdownProcessor
        - suffix: ".docx"
          class_path: knowledge_flow_backend.core.processors.input.docx_markdown_processor.docx_markdown_processor.DocxMarkdownProcessor
        - suffix: ".pptx"
          class_path: knowledge_flow_backend.core.processors.input.pptx_markdown_processor.pptx_markdown_processor.PptxMarkdownProcessor
        - suffix: ".csv"
          class_path: knowledge_flow_backend.core.processors.input.csv_tabular_processor.csv_tabular_processor.CsvTabularProcessor
        - suffix: ".txt"
          class_path: knowledge_flow_backend.core.processors.input.text_markdown_processor.text_markdown_processor.TextMarkdownProcessor
        - suffix: ".md"
          class_path: knowledge_flow_backend.core.processors.input.markdown_markdown_processor.markdown_markdown_processor.MarkdownMarkdownProcessor
        - suffix: ".png"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".jpg"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".jpeg"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".gif"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".bmp"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".svg"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".webp"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".ico"
          class_path: knowledge_flow_backend.core.processors.input.image_processor.image_processor.ImageProcessor
        - suffix: ".jsonl"
          class_path: knowledge_flow_backend.core.processors.input.jsonl.jsonl_markdown_processor.JsonlMarkdownProcessor
