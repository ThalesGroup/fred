app:
  name: Control Plane Backend
  base_url: /control-plane/v1
  address: 127.0.0.1
  port: 8222
  log_level: info
  gcu_version: "v1"
  # Production defaults: scrape via Prometheus/Grafana and avoid KPI log noise.
  kpi_process_metrics_interval_sec: 0
  kpi_log_summary_interval_sec: 0.0
  kpi_log_summary_top_n: 0
  default_team_max_resources_storage_size: 5368709120
  personal_max_resources_storage_size: 5368709120

scheduler:
  enabled: false
  # temporal: requires Temporal server + run-worker process
  # memory: execute lifecycle pass in API process (no worker needed)
  backend: temporal
  temporal:
    host: localhost:7233
    namespace: default
    task_queue: control-plane-lifecycle
    workflow_id_prefix: control-plane
    connect_timeout_seconds: 5

security:
  m2m:
    enabled: false
    realm_url: http://localhost:8080/realms/app
    client_id: control-plane
    secret_env_var: KEYCLOAK_CONTROL_PLANE_CLIENT_SECRET # pragma: allowlist secret
  user:
    enabled: false
    realm_url: http://localhost:8080/realms/app
    client_id: app
  authorized_origins:
    - http://localhost:5173
  rebac:
    enabled: false
    type: openfga
    api_url: "http://localhost:9080"

storage:
  postgres:
    sqlite_path: "~/.fred/control-plane/control_plane.sqlite3"
  content_storage:
    type: local
    root_path: "~/.fred/control-plane/content-storage"

policies:
  purge_catalog_path: ./conversation_policy_catalog.yaml

platform:
  # Runtime pod references only. Managed agent instance enrollment is DB-backed.
  runtime_catalog_sources:
    - runtime_id: fred-samples-agents
      base_url: http://127.0.0.1:8010/samples/agents/v1
      enabled: true
      ingress_prefix: /samples/agents/v1
    - runtime_id: fred-agents
      base_url: http://127.0.0.1:8000/fred/agents/v2
      enabled: true
      ingress_prefix: /fred/agents/v2
