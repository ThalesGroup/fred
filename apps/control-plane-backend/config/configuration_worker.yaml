# yaml-language-server: $schema=./schema/configuration.schema.json
app:
  name: Control Plane Backend
  base_url: /control-plane/v1
  address: 127.0.0.1
  port: 8222
  log_level: info

scheduler:
  enabled: true
  # Worker process is only used when backend=temporal.
  backend: temporal
  temporal:
    host: localhost:7233
    namespace: default
    task_queue: control-plane-lifecycle
    workflow_id_prefix: control-plane
    connect_timeout_seconds: 5

security:
  m2m:
    enabled: false
    realm_url: http://localhost:8080/realms/app
    client_id: control-plane
    secret_env_var: KEYCLOAK_CONTROL_PLANE_CLIENT_SECRET # pragma: allowlist secret
  user:
    enabled: false
    realm_url: http://localhost:8080/realms/app
    client_id: app
  authorized_origins: []

storage:
  postgres:
    # Same Fred Postgres the API uses (configuration_prod.yaml) and that the
    # fred-deployment-factory compose publishes on the host (app-postgres → localhost:5432).
    # Password comes from FRED_POSTGRES_PASSWORD in config/.env (loaded via ENV_FILE).
    host: localhost
    port: 5432
    database: fred
    username: fred
  content_storage:
    type: local
    root_path: "~/.fred/control-plane/content-storage"
  opensearch:
    host: "https://localhost:9200"
    username: "admin"
    secure: true
    verify_certs: false
  log_store:
    type: opensearch
    index: app-logs-index

policies:
  purge_catalog_path: ./conversation_policy_catalog.yaml

platform:
  # Must mirror configuration_prod.yaml's runtime_catalog_sources — the
  # lifecycle worker resolves a session's runtime here (checkpoint + history
  # erase) via ConversationErasureService._resolve_runtime_base_url. Left
  # empty, every source lookup misses regardless of which runtime is actually
  # registered, and conversation erasure never converges (CTRLP-12): each
  # tick logs "unresolved runtime: source '<id>' is disabled or missing" and
  # re-queues the same sessions forever.
  knowledge_flow_base_url: http://127.0.0.1:8111/knowledge-flow/v1
  runtime_catalog_sources:
    - runtime_id: fred-samples-agents
      base_url: http://127.0.0.1:8010/samples/agents/v1
      enabled: true
      ingress_prefix: /samples/agents/v1
    - runtime_id: fred-agents
      base_url: http://127.0.0.1:8000/fred/agents/v2
      enabled: true
      ingress_prefix: /fred/agents/v2
    - runtime_id: rags-agents
      base_url: http://127.0.0.1:8013/rags/agents/v2
      enabled: true
      ingress_prefix: /rags/agents/v2
    - runtime_id: dt-agents
      base_url: http://127.0.0.1:8020/dt/agents/v2
      enabled: true
      ingress_prefix: /dt/agents/v2
