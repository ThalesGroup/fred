# yaml-language-server: $schema=./schema/configuration.schema.json
app:
  name: "Fred default agents"
  base_url: "/fred/agents/v2"
  host: "0.0.0.0"
  port: 8000
  log_level: "info"
  # Optional hard ceiling on concurrent HTTP/WebSocket connections accepted by
  # Uvicorn. Set to null to disable the limit.
  limit_concurrency: null
  openai_compat: true

security:
  m2m:
    enabled: true
    client_id: "agentic"
    realm_url: "http://app-keycloak:8080/realms/app"
    secret_env_var: KEYCLOAK_AGENTIC_CLIENT_SECRET # pragma: allowlist secret (env var name only)
  user:
    enabled: true
    # RUNTIME-07 rev. 2 (D5c): each agent pod is a Keycloak OAuth2 resource server
    # and validates the JWT `aud` against this client_id (strict under profile: c3).
    # For per-agent audience isolation (anti confused-deputy), every pod DEPLOYMENT
    # overrides this with its OWN Keycloak client (e.g. fred-agent / dt-agent /
    # rags-agent) via Helm values, and the realm issues user tokens whose audience
    # includes the target pod's client. The value below is the local-dev default.
    client_id: "app"
    realm_url: "http://app-keycloak:8080/realms/app"
  authorized_origins:
    - "http://localhost:5173"
  rebac:
    enabled: true
    type: openfga
    api_url: "http://localhost:9080"

ai:
  knowledge_flow_url: "http://localhost:8111/knowledge-flow/v1"
  timeout:
    connect: 20
    read: 60

observability:
  tracer: langfuse    # null | logging | langfuse
  langfuse:
    host: "http://localhost:3001"
    # LANGFUSE_PUBLIC_KEY and LANGFUSE_SECRET_KEY in .env

storage:
  postgres:
    host: localhost
    port: 5432
    database: fred
    username: fred
  opensearch:
    host: "https://localhost:9200"
    username: "admin"
    secure: true
    verify_certs: false

scheduler:
  enabled: false

platform:
  control_plane_url: "http://localhost:8222/control-plane/v1"
