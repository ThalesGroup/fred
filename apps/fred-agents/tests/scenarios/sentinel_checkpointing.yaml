name: "Sentinel checkpointing — session continuity and pod-restart durability"
description: >
  Verify the SQLite checkpointer persists session history correctly across
  three distinct cases:

    1. Within a single run  — turn 2 recalls what was said in turn 1.
    2. After a pod restart  — the same session_id resumes from the SQLite
                               file after the pod process is killed and
                               restarted. This is the durability gate.
    3. Session isolation    — a different session_id receives no history
                               from the first session.

  The scenario pauses between phase 2 and phase 3 to let the tester
  restart the pod manually. Run with `pytest -s` so the pause prompt
  reaches your terminal.

agent_id: sentinel.react.v2
user_id: test-user

steps:
  # -----------------------------------------------------------------------
  # Phase 1 — plant
  # Plant a recognisable token so recall is unambiguous.
  # -----------------------------------------------------------------------
  - id: plant
    message: >
      For this conversation only, remember the code word DELTA-7.
      Acknowledge that you have noted it.
    mode: final
    session_id: "ckpt-main-${run_id}"
    checks:
      - kind: final
      - no_error: true

  # -----------------------------------------------------------------------
  # Phase 2 — recall within the same run
  # Same session_id → LangGraph restores the message history from SQLite.
  # If the checkpointer is not wired the LLM gets no context and fails here.
  # -----------------------------------------------------------------------
  - id: recall-same-run
    message: "What code word did I give you at the start of this session?"
    mode: final
    session_id: "ckpt-main-${run_id}"
    checks:
      - kind: final
      - no_error: true
      - content_contains: "DELTA-7"

  # -----------------------------------------------------------------------
  # Pause — restart the pod
  # The tester stops the pod (Ctrl+C on `make run`) and starts it again.
  # The SQLite file at ./runtime.sqlite3 must be kept intact.
  # -----------------------------------------------------------------------
  - id: restart-pause
    type: pause
    message: |
      ══════════════════════════════════════════════════════════════════
      CHECKPOINT DURABILITY TEST — POD RESTART REQUIRED

      Session id planted in this run: ckpt-main-${run_id}

      Steps:
        1. Stop the running pod  (Ctrl+C on `make run`)
        2. Verify ./runtime.sqlite3 still exists (do NOT delete it)
        3. Restart the pod        (make run)
        4. Wait until the pod is healthy (GET /fred/agents/v2/agents → 200)
        5. Press Enter here to continue the scenario
      ══════════════════════════════════════════════════════════════════

  # -----------------------------------------------------------------------
  # Phase 3 — recall after pod restart
  # Same session_id, new pod process → must resume from SQLite checkpoint.
  # -----------------------------------------------------------------------
  - id: recall-after-restart
    message: "What code word did I give you at the start of this session?"
    mode: final
    session_id: "ckpt-main-${run_id}"
    checks:
      - kind: final
      - no_error: true
      - content_contains: "DELTA-7"

  # -----------------------------------------------------------------------
  # Phase 4 — isolation
  # Different session_id → fresh history, must not recall DELTA-7.
  # -----------------------------------------------------------------------
  - id: isolation
    message: "What code word, if any, have I given you in our conversation?"
    mode: final
    session_id: "ckpt-other-${run_id}"
    checks:
      - kind: final
      - no_error: true
      - content_not_contains: "DELTA-7"
