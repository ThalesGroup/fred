name: "S1.1 — Managed execution (agent_instance_id via control-plane)"
description: >
  Verify that fred.test.assistant works via the managed path:
  prepare-execution → SSE stream → session_history written.

  Requires FRED_AGENT_INSTANCE_ID to be set to a valid agent_instance_id
  enrolled in the local control-plane pod. Skip this scenario if the env var
  is absent (raw path is already covered by s1_raw_echo).

agent_id: fred.test.assistant
agent_instance_id: "${env:FRED_AGENT_INSTANCE_ID}"
user_id: s1-test-user

steps:
  - id: managed-echo-stream
    type: turn
    mode: stream
    message: "echo S1 managed path check"
    session_id: "s1-managed-${run_id}"
    checks:
      - kind: final
      - no_error: true
      - content_contains: "S1 managed path check"
      - history_has_messages: true
      - kpi_turn_recorded: true
