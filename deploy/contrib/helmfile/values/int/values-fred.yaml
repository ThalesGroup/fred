# =============================================================================
# values-fred.yaml — Integration environment overrides (PRISM)
# =============================================================================
#
# This file overrides the defaults from deploy/charts/fred/values.yaml
# for the PRISM integration environment. It contains environment-specific
# configuration: Carma registry images, SSL certificates, TGS models,
# Thales URLs, and production storage backends.
#
# Note: YAML anchors defined in values.yaml are NOT available in this file
# (each values file is parsed independently by Helm).
# Lists (e.g. input_processors) are fully replaced during merge — partial
# list overrides are not possible in Helm.
# =============================================================================

# ── Shared anchors (reused across applications) ─────────────────────────────

x-common-security: &common-security
  m2m:
    realm_url: &realm-url "https://prism-idp-int.six.cloud.thales/realms/app"
  user:
    realm_url: *realm-url
  authorized_origins:
    - "http://prism-ui-int.six.cloud.thales"
    - "https://prism-ui-int.six.cloud.thales"
  rebac:
    enabled: true

x-common-postgres: &common-postgres
  host: "postgresql"
  port: 5432
  database: fred
  username: fred

x-common-opensearch: &common-opensearch
  host: https://prism-opensearch-int.six.cloud.thales

x-common-migration: &common-migration
  migration:
  enabled: true
  scaleDown: true
  backoffLimit: 3

x-kf-scheduler: &kf-scheduler
  enabled: true
  backend: "temporal"
  temporal:
    host: "temporal-frontend:7233"
    namespace: "default"
    task_queue: "ingestion"
    workflow_id_prefix: "pipeline"
    connect_timeout_seconds: 5
    ingestion_workflow_parallelism: 10 # TODO: see how much we can bump it, default is 3
    ingestion_max_concurrent_workflow_tasks: 10 # TODO: see how much we can bump it, default is 3
    ingestion_max_concurrent_activities: 10 # TODO: see how much we can bump it, default is 3
x-kf-content-storage: &kf-content-storage
  type: minio
  endpoint: http://minio:9000
  access_key: "admin"
  bucket_name: "knowledge-flow-content"
  secure: false
  public_endpoint: https://prism-minio-int.six.cloud.thales
  public_secure: true

x-kf-filesystem: &kf-filesystem
  <<: *kf-content-storage
  bucket_name: "filesystem"

x-kf-embedding-model: &kf-embedding-model
  provider: "openai"
  name: bge-m3
  settings:
    base_url: "https://api.corp.thales/corp/genai-embedding/v2"

x-kf-chat-model: &kf-chat-model
  provider: "openai"
  name: "mistral"
  settings:
    base_url: "https://api.corp.thales/corp/genai/llm/medium/v1"
    request_timeout: 300
    stream_usage: false

x-kf-storage: &kf-storage
  postgres: *common-postgres
  opensearch: *common-opensearch
  catalog_store:
    type: "postgres"
  prompt_store:
    type: "postgres"
  resource_store:
    type: "postgres"
  tag_store:
    type: "postgres"
  metadata_store:
    type: "postgres"
  kpi_store:
    type: "opensearch"
    index: kpi-index
  vector_store:
    type: "opensearch"
    index: vector-index-3-large
    bulk_size: 1000
  log_store:
    type: "opensearch"
    index: log-index
  task_store:
    type: "postgres"
  tabular_store:
    artifacts_prefix: "tabular/datasets"
    format: "parquet"
    compression: "snappy"
    query:
      engine: "duckdb"
      access_mode: "presigned_url"
      internal_presigned_ttl_seconds: 3600
      default_max_rows: 200
      max_rows: 1000

x-kf-mcp: &kf-mcp
  reports_enabled: false
  kpi_enabled: false
  tabular_enabled: true
  statistic_enabled: false
  text_enabled: true
  templates_enabled: false
  resources_enabled: false
  opensearch_ops_enabled: false
  neo4j_enabled: false
  filesystem_enabled: false

x-cp-scheduler: &cp-scheduler
  enabled: true
  backend: "temporal"
  temporal:
    host: "temporal-frontend:7233"
    namespace: "default"
    task_queue: "control-plane-lifecycle"
    workflow_id_prefix: "control-plane"
    connect_timeout_seconds: 5

x-cp-storage: &cp-storage
  postgres:  *common-postgres
  session_store:
    type: postgres
  content_storage: 
    <<: *kf-content-storage
    bucket_name: "control-plane-content"

x-ssl-extra-env-vars: &ssl-extra-env-vars
  - name: SSL_CERT_FILE
    value: "/etc/ssl/certs/thales.pem"
  - name: REQUESTS_CA_BUNDLE
    value: "/etc/ssl/certs/thales.pem"

x-ssl-extra-volumes: &ssl-extra-volumes
  - name: thales-certificate
    secret:
      secretName: "thales-secret-chain"

x-ssl-extra-volume-mounts: &ssl-extra-volume-mounts
  - name: thales-certificate
    mountPath: /etc/ssl/certs/thales.pem
    subPath: tls.crt
    readOnly: true

x-carma-pull-secret: &carma-pull-secret
  - name: "carma-pull-secret"

x-disable-service-account: &disable-service-account
  rbac:
    enabled: false

# =============================================================================

global:
  create_index:
    enabled: false
    image: "carma.corp.thales/proxy-docker-internal-c2/fred/opensearchproject/opensearch:2.19.3"
  persistence:
    accessModes: "ReadWriteMany"
    storageClass: "ontap-nfs"

# =============================================================================

applications:

  # ===========================================================================
  # AGENTIC BACKEND
  # ===========================================================================
  agentic-backend:
    replicaCount: 2
    image:
      repository: carma.corp.thales/proxy-docker-internal-c2/fred/agentic-backend
      tag: &prism-tag "dev-prism"
      pullPolicy: &prism-pullPolicy Always
    imagePullSecrets: *carma-pull-secret
    serviceAccount: *disable-service-account
    extraEnvVars: *ssl-extra-env-vars
    extraVolumes: *ssl-extra-volumes
    extraVolumeMounts: *ssl-extra-volume-mounts
    resources:
      requests:
        cpu: 125m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi

    # ── Application Configuration ─────────────────────────────────────────────
    configuration:
      app:
        log_level: "info"
        gcu_version: &gcu-version "v1"

      security: *common-security

      frontend_settings:
        properties:
          logoName: "logo_PRISM_light"
          logoNameDark: "logo_PRISM_dark"
          logoHeight: "24px"
          logoWidth: "129px"
          faviconName: "favicon_PRISM_light"
          faviconNameDark: "favicon_PRISM_dark"
          siteDisplayName: "PRISM.AI"
          siteTitle: "Prism"
          siteSubtitle: "AI Hub"
          agentsNicknameSingular: "Lumi"
          agentsNicknamePlural: "Lumis"
          contactSupportLink: "https://join.citadel.team/web-client/#/room/!rPdYXaGrZwwbgsEPaK:thales.citadel.team?deeplink=true"
          agentIconName: "customAgent"
          showAgentRegisterA2A: false
          showAgentRestoreFromConfiguration: false
          showAgentCode: false
          allowAgentSwitchInOneConversation: false
          showAgentDisableButton: false
          defaultTeamBannerFile: "default-team-banner-prism.png"
          defaultTeamAvatarFile: "default-team-avatar-prism.png"
          defaultPersonalBannerFile: "default-personal-banner.png"
          defaultPersonalAvatarFile: "default-personal-banner.png"
          gcuVersion: *gcu-version

      scheduler:
        backend: "temporal"
        temporal:
          host: "temporal-frontend:7233"
          namespace: "default"
          task_queue: "agents"
          workflow_id_prefix: "task"
          connect_timeout_seconds: 5

      ai:
        max_concurrent_sessions_per_user: 9999
        max_attached_files_per_user: 9999
        knowledge_flow_url: "https://prism-ui-int.six.cloud.thales/knowledge-flow/v1"

      storage:
        postgres: *common-postgres
        opensearch: *common-opensearch
        feedback_store:
          type: "postgres"
        agent_store:
          type: "postgres"
        mcp_servers_store:
          type: "postgres"
        session_store:
          type: "postgres"
        attachments_store:
          type: "postgres"
        history_store:
          type: "postgres"
        kpi_store:
          type: "opensearch"
          index: kpi-index
        log_store:
          type: "opensearch"
          index: log-index
        task_store:
          type: "postgres"
          table: agentic-tasks

    # ── Agent catalog ─────────────────────────────────────────────────────────
    agents_catalog:
      version: v1
      agents:
      - id: "Luigi"
        name: "Luigi"
        type: "agent"
        class_path: "agentic_backend.agents.v1.production.contrib.ppt_filler.ppt_filler_agent.PptFillerAgent"
        enabled: true
        chat_options:
          libraries_selection: true
          attach_files: true

      - id: "Raph"
        name: "Raph"
        type: "agent"
        class_path: "agentic_backend.agents.v1.production.contrib.reference_editor.reference_editor.ReferenceEditor"
        enabled: true

      - id: "Jim"
        name: "Jim"
        type: "agent"
        class_path: "agentic_backend.agents.v1.production.contrib.jira.jira_agent.JiraAgent"
        enabled: true
        chat_options:
          libraries_selection: true
          attach_files: true

      - id: "Tessa"
        name: "Tessa"
        type: "agent"
        class_path: "agentic_backend.agents.v1.production.tabular.tabular_expert.Tessa"
        enabled: true
  
      # -------- Bid and capture agents
      - id: "Archie"
        name: "Archie"
        type: "agent"
        class_path: "agentic_backend.agents.v1.production.rags.archie.Archie"
        enabled: true
        chat_model: {}
        chat_options:
          search_policy_selection: true
          libraries_selection: true
          search_rag_scoping: true
          attach_files: false
          deep_search_delegate: false
    
      - id: "Tempo"
        name: "Tempo"
        type: "agent"
        class_path: "agentic_backend.agents.v1.production.contrib.bid_and_capture.tempo.Tempo"
        enabled: true
        chat_model: {}
        chat_options:
          search_policy_selection: true
          libraries_selection: false
          documents_selection: false
          search_rag_scoping: true
          deep_search_delegate: false
          attach_files: true
          include_corpus_in_search: false

      - id: "Bid Mgr"
        name: "Bid Mgr"
        type: "agent"
        class_path: "agentic_backend.agents.v1.production.contrib.bid_and_capture.bid_mgr.bid_mgr.BidMgr"
        enabled: true
        chat_options:
          libraries_selection: true
          attach_files: true      

      - id: "Bench"
        name: "Bench"
        type: "agent"
        definition_ref: "v2.react.basic"
        enabled: true
        tuning:
          role: "Load testing agent — answers questions using document search via MCP"
          description: "Agent de benchmark utilisant le mock OpenAI et le RAG via MCP"
          mcp_servers:
            - id: "mcp-knowledge-flow-mcp-text"

      # SQL Agent
      - id: "SQL Agent"
        name: "SQL Agent"
        type: "agent"
        definition_ref: "v2.production.sql_analyst"
        
      react_profiles:
      - profile_id: "rag_expert"
        enabled: true

    # ── Models catalog (TGS Mistral Medium + Mock OpenAI for load testing) ─────
    models_catalog:
      version: v1
      common_model_settings:
        max_retries: 0
        timeout:
          connect: 10.0
          read: 300.0
        temperature: 0.0
      default_profile_by_capability:
        chat: chat.tgs.mistral-medium
        language: language.tgs.mistral-medium
      profiles:
        - profile_id: chat.tgs.mistral-medium
          capability: chat
          description: "Mistral Medium via TGS for chat"
          model:
            provider: openai
            name: mistral
            settings:
              base_url: "https://api.corp.thales/corp/genai/llm/medium/v1"
              request_timeout: 300
              stream_usage: false
        - profile_id: language.tgs.mistral-medium
          capability: language
          description: "Mistral Medium via TGS for language tasks"
          model:
            provider: openai
            name: mistral
            settings:
              base_url: "https://api.corp.thales/corp/genai/llm/medium/v1"
              request_timeout: 300
              stream_usage: false
        - profile_id: chat.mock.gpt-4o
          capability: chat
          description: "Mock OpenAI server for load testing — internal cluster only"
          model:
            provider: openai
            name: gpt-4o
            settings:
              base_url: "http://mock-openai-server:8383/v1"
              # openai_api_key: "key-1"
              request_timeout: 30
              stream_usage: false
        - profile_id: language.mock.gpt-4o
          capability: language
          description: "Mock OpenAI server for load testing — internal cluster only"
          model:
            provider: openai
            name: gpt-4o
            settings:
              base_url: "http://mock-openai-server:8383/v1"
              # openai_api_key: "key-1"
              request_timeout: 30
              stream_usage: false
      rules:
        - rule_id: "bench.chat"
          capability: chat
          target_profile_id: chat.mock.gpt-4o
          match:
            agent_id: "85ec4440-cc7f-4371-a048-bda09b974b31"
        - rule_id: "bench.language"
          capability: language
          target_profile_id: language.mock.gpt-4o
          match:
            agent_id: "85ec4440-cc7f-4371-a048-bda09b974b31"

    # ── MCP catalog (text search only) ────────────────────────────────────────
    mcp_catalog:
      version: v1
      servers:
        - id: "mcp-knowledge-flow-mcp-text"
          name: "mcp.servers.search_documents.name"
          description: "mcp.servers.search_documents.description"
          transport: "inprocess"
          provider: "kf_vector_search"
          enabled: true
          auth_mode: "user_token"
        - id: "mcp-knowledge-flow-mcp-tabular"
          name: "mcp.servers.tabular.name"
          description: "mcp.servers.tabular.description"
          transport: "streamable_http"
          url: "http://knowledge-flow-backend:8000/knowledge-flow/v1/mcp-tabular"
          sse_read_timeout: 2000
          enabled: true
          auth_mode: "user_token"

  # ===========================================================================
  # FRONTEND
  # ===========================================================================
  frontend:
    image:
      # repository: carma.corp.thales/proxy-docker-internal-c2/fred/frontend@sha256
      # tag: 052720b10002fe96a7fc02adbac4458055adcd581c6a7b9d26f00c0d4c936655
      repository: carma.corp.thales/proxy-docker-internal-c2/fred/frontend
      tag: *prism-tag
      pullPolicy: *prism-pullPolicy
    imagePullSecrets: *carma-pull-secret
    serviceAccount: *disable-service-account
    extraEnvVars: *ssl-extra-env-vars
    extraVolumes: *ssl-extra-volumes
    extraVolumeMounts: *ssl-extra-volume-mounts
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi

    ingress:
      annotations:
        nginx.ingress.kubernetes.io/proxy-body-size: 150m
        nginx.org/proxy-connect-timeout: 300s
        nginx.org/proxy-read-timeout: 300s
      hosts:
        - host: prism-ui-int.six.cloud.thales
          paths:
            - path: /
              pathType: Prefix
              service:
                name: frontend
                port: 80
            - path: /agentic
              pathType: Prefix
              service:
                name: agentic-backend
                port: 80
            - path: /knowledge-flow
              pathType: Prefix
              service:
                name: knowledge-flow-backend
                port: 8000
            - path: /control-plane
              pathType: Prefix
              service:
                name: control-plane-backend
                port: 8222
      tls:
        - hosts:
            - "prism-ui-int.six.cloud.thales"
          secretName: "tls-dc2-wd1-six-int-kns-pri"

    configuration:
      config_json:
        backend_url_api: "https://prism-ui-int.six.cloud.thales"
        backend_url_knowledge: "https://prism-ui-int.six.cloud.thales"
        websocket_url: "ws://prism-ui-int.six.cloud.thales/fred/chatbot/query"

  # ===========================================================================
  # KNOWLEDGE FLOW BACKEND
  # ===========================================================================
  knowledge-flow-backend:
    replicaCount: 2
    image:
      repository: carma.corp.thales/proxy-docker-internal-c2/fred/knowledge-flow-backend
      tag: *prism-tag
      pullPolicy: *prism-pullPolicy
    imagePullSecrets: *carma-pull-secret
    serviceAccount: *disable-service-account
    extraEnvVars: *ssl-extra-env-vars
    extraVolumes: *ssl-extra-volumes
    extraVolumeMounts: *ssl-extra-volume-mounts
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

    configuration:
      app:
        log_level: "info"
        gcu_version: *gcu-version

      processing:
        profiles:
          fast:
            use_gpu: false
          medium:
            use_gpu: false
          rich:
            use_gpu: false

      security:        *common-security
      scheduler:       *kf-scheduler
      content_storage: *kf-content-storage
      embedding_model: *kf-embedding-model
      chat_model:      *kf-chat-model
      vision_model:    *kf-chat-model
      storage:         *kf-storage
      mcp:             *kf-mcp
      filesystem:      *kf-filesystem

    probes:
      livenessProbe:
        data:
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 600
          failureThreshold: 20
      readinessProbe:
        data:
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 600
          failureThreshold: 20

  # ===========================================================================
  # KNOWLEDGE FLOW WORKER
  # ===========================================================================
  knowledge-flow-worker:
    enabled: true
    deployment:
      enabled: true
    replicaCount: 2
    configurationFileName: configuration.yaml
    image:
      repository: carma.corp.thales/proxy-docker-internal-c2/fred/knowledge-flow-backend
      tag: *prism-tag
      pullPolicy: *prism-pullPolicy
    imagePullSecrets: *carma-pull-secret
    serviceAccount: *disable-service-account
    extraEnvVars: *ssl-extra-env-vars
    extraVolumes: *ssl-extra-volumes
    extraVolumeMounts: *ssl-extra-volume-mounts
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 3Gi
    env:
      - name: LOG_LEVEL
        value: "WARNING"
      - name: CONFIG_FILE
        value: "/app/config/configuration.yaml"

    configuration:
      processing:
        profiles:
          fast:
            use_gpu: false
          medium:
            use_gpu: false
          rich:
            use_gpu: false

      security:        *common-security
      scheduler:       *kf-scheduler
      content_storage: *kf-content-storage
      embedding_model: *kf-embedding-model
      chat_model:      *kf-chat-model
      vision_model:    *kf-chat-model
      storage:         *kf-storage
      mcp:             *kf-mcp
      filesystem:      *kf-filesystem

  # ===========================================================================
  # CONTROL PLANE BACKEND
  # ===========================================================================
  control-plane-backend:
    replicaCount: 2
    image:
      repository: carma.corp.thales/proxy-docker-internal-c2/fred/control-plane-backend
      tag: *prism-tag
      pullPolicy: *prism-pullPolicy
    imagePullSecrets: *carma-pull-secret
    serviceAccount: *disable-service-account
    extraEnvVars: *ssl-extra-env-vars
    extraVolumes: *ssl-extra-volumes
    extraVolumeMounts: *ssl-extra-volume-mounts
    resources:
      requests:
        cpu: 125m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi

    configuration:
      app:
        log_level: "info"
        gcu_version: *gcu-version

      security:  *common-security
      scheduler: *cp-scheduler
      storage:   *cp-storage

  # ===========================================================================
  # CONTROL PLANE WORKER
  # ===========================================================================
  control-plane-worker:
    enabled: true
    deployment:
      enabled: true
    replicaCount: 1
    image:
      repository: carma.corp.thales/proxy-docker-internal-c2/fred/control-plane-backend
      tag: *prism-tag
      pullPolicy: *prism-pullPolicy
    imagePullSecrets: *carma-pull-secret
    serviceAccount: *disable-service-account
    extraEnvVars: *ssl-extra-env-vars
    extraVolumes: *ssl-extra-volumes
    extraVolumeMounts: *ssl-extra-volume-mounts
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

    configuration:
      security:  *common-security
      scheduler: *cp-scheduler
      storage:   *cp-storage
 