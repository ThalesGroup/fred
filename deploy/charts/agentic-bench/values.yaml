# Image settings
image:
  repository: carma.corp.thales/proxy-docker-internal-c2/fred/benchmark-tools
  tag: 0.0.4-prism
  pullPolicy: IfNotPresent
imagePullSecrets: &carma-pull-secret
      - name: "carma-pull-secret"


# Job configuration
job:
  restartPolicy: Never
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  annotations: {}
  labels: {}

# Benchmark client flags
bench:
  url: ws://agentic-backend:80/agentic/v1/chatbot/query/ws
  agent: Georges
  message: Hello
  clients: 20
  requests: 100
  requestsPerClient: 0         # if >0, per-client mode; otherwise uses requests
  timeoutSeconds: 90
  insecureTLS: false
  tokenInQuery: false
  allowEmptyToken: false
  sessionTitle: Benchmark
  createSession: true
  deleteSession: true
  prepareSessions: true
  prepareConcurrency: 20
  extraArgs: []                # additional raw args, e.g. ["-session","abc"]

# Secret that holds the bearer token
tokenSecret:
  name: "bench-token-secret"                     # set to an existing Secret to populate AGENTIC_TOKEN
  key: token
  optional: false

serviceAccount:
  create: false
  name: ""

securityContext:
  runAsUser: 1000       
  runAsGroup: 3000       
  runAsNonRoot: true    
  fsGroup: 2000          
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false 
  runAsNonRoot: true              
  runAsUser: 1000       
  runAsGroup: 3000
  capabilities:
    drop:
      - ALL                       
  readOnlyRootFilesystem: false   
    
nodeSelector: {}
tolerations: []
affinity: {}

resources: {}

