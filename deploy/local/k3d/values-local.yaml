# =============================================================================
# values-local.yaml — k3d local development overrides
# =============================================================================
# Usage (from repo root):
#   make k3d-deploy          # build + import + helm install (all-in-one)
#   make k3d-deploy-only     # helm install only (images already in k3d)
#
# Manual usage:
#   helm upgrade --install fred-app deploy/charts/fred \
#     --namespace fred \
#     -f deploy/contrib/helmfile/values/values-local.yaml \
#     --wait --timeout 5m
#
# Prerequisites:
#   1. Build images:
#        cd agentic-backend && make docker-build && cd ..
#        cd knowledge-flow-backend && make docker-build && cd ..
#        cd frontend && make docker-build && cd ..
#   2. Import into k3d:
#        k3d image import ghcr.io/thalesgroup/fred-agent/agentic-backend:0.1 -c fred
#        k3d image import ghcr.io/thalesgroup/fred-agent/knowledge-flow-backend:0.1 -c fred
#        k3d image import ghcr.io/thalesgroup/fred-agent/frontend:0.1 -c fred
# =============================================================================

global:
  create_index:
    enabled: false
  persistence:
    enabled: false

applications:
  agentic-backend:
    image:
      tag: "0.1"
    # -------------------------------------------------------------------------
    # Catalog URL/Settings overrides (deep merged by id with base catalog in image)
    # -------------------------------------------------------------------------
    catalogs:
      mcp_override:
        # Only URLs point to k8s service instead of localhost
        servers:
          - id: "mcp-knowledge-flow-mcp-text"
            url: "http://knowledge-flow-backend:8111/knowledge-flow/v1/mcp-text"
          - id: "mcp-knowledge-flow-mcp-tabular"
            url: "http://knowledge-flow-backend:8111/knowledge-flow/v1/mcp-tabular"
          - id: "mcp-knowledge-flow-opensearch-ops"
            url: "http://knowledge-flow-backend:8111/knowledge-flow/v1/mcp-opensearch-ops"
          - id: "mcp-knowledge-flow-fs"
            url: "http://knowledge-flow-backend:8111/knowledge-flow/v1/mcp-fs"
          - id: "mcp-knowledge-flow-corpus"
            url: "http://knowledge-flow-backend:8111/knowledge-flow/v1/mcp-corpus"
          - id: "mcp-neo4j-graph-db"
            url: "http://knowledge-flow-backend:8111/knowledge-flow/v1/mcp-neo4j"
          - id: "mcp-knowledge-flow-statistics"
            url: "http://knowledge-flow-backend:8111/knowledge-flow/v1/mcp-statistics"
          - id: "mcp-iot-tracking-demo"
            enabled: false

      models_override:
        # Example: override Azure settings for specific profile
        profiles:
          - profile_id: chat.azure_apim.gpt4o
            model:
              settings:
                azure_ad_client_scope: "api://my-new-client-id/.default"

      agents_override:
        # Example: disable an agent without rebuild
        agents:
          - id: "Georges"
            enabled: true

    configuration:
      scheduler:
        enabled: true
        temporal:
          host: "temporal:7233"

      security:
        m2m:
          enabled: true
          client_id: "agentic"
          realm_url: "http://keycloak:8080/realms/app"
          secret_env_var: KEYCLOAK_AGENTIC_CLIENT_SECRET
        user:
          enabled: true
          client_id: "app"
          realm_url: "http://keycloak:8080/realms/app"
        authorized_origins:
          - "http://localhost:8088"
        rebac:
          enabled: true
          type: openfga
          api_url: "http://openfga:9080"

      frontend_settings:
        feature_flags:
          enableK8Features: false
          enableElecWarfare: false
        properties:
          logoName: "fred"
          siteDisplayName: "Fred"

      ai:
        knowledge_flow_url: "http://knowledge-flow-backend:8111/knowledge-flow/v1"

      storage:
        postgres: &POSTGRES_COMMON
          host: postgres
          port: 5432
          database: fred
          username: fred
        opensearch: &OPENSEARCH_COMMON
          host: https://opensearch:9200
          secure: true
          verify_certs: false
          username: admin
        feedback_store:
          type: "postgres"
          table: feedbacks
        agent_store:
          type: "postgres"
          table: agent
        mcp_servers_store:
          type: "postgres"
          table: mcp-server
        session_store:
          type: "postgres"
          table: session
        attachments_store:
          type: "postgres"
          table: session_attachments
        history_store:
          type: "postgres"
          table: session_history
        task_store:
          type: "postgres"
          table: tasks
        kpi_store:
          type: "log"
          level: "DEBUG"
        log_store:
          type: "in_memory"

    # -------------------------------------------------------------------------
    # Agentic Backend — Secrets (.env)
    # -------------------------------------------------------------------------
    dotenv:
      KEYCLOAK_AGENTIC_CLIENT_SECRET: "Azerty123_"
      OPENAI_API_KEY: "123"                     # <-- fill with your OpenAI key
      FRED_POSTGRES_PASSWORD: "Azerty123_"
      OPENSEARCH_PASSWORD: "FredDemo_2026!"
      OPENFGA_API_TOKEN: "Azerty123_"

  # ===========================================================================
  # FRONTEND
  # ===========================================================================
  frontend:
    enabled: true
    image:
      tag: "0.1"
    env:
      - name: VITE_ALLOWED_HOSTS
        value: "all"
      - name: VITE_BACKEND_URL_KNOWLEDGE
        value: "http://localhost:8088"
      - name: VITE_USE_AUTH
        value: "true"
    service:
      type: ClusterIP
    ingress:
      enabled: true
      className: "traefik"
      hosts:
        - host: ""
          paths:
            - path: /
              pathType: Prefix
              service:
                name: frontend
                port: 80
            - path: /agentic
              pathType: Prefix
              service:
                name: agentic-backend
                port: 80
            - path: /knowledge-flow
              pathType: Prefix
              service:
                name: knowledge-flow-backend
                port: 8000
            - path: /temporal
              pathType: Prefix
              service:
                name: temporal-ui
                port: 8080
            - path: /realms
              pathType: Prefix
              service:
                name: keycloak
                port: 8080
            - path: /resources
              pathType: Prefix
              service:
                name: keycloak
                port: 8080
    volumeMounts:
      - name: frontend-config-vol
        mountPath: /usr/share/nginx/html/config.json
        subPath: config.json
    volumes:
      - name: frontend-config-vol
        configMap:
          name: frontend-front
    configuration:
      config_json:
        backend_url_api: "http://localhost:8088"
        backend_url_knowledge: "http://localhost:8088"
        websocket_url: "ws://localhost:8088/fred/chatbot/query"
        frontend_basename: "/"

  # ===========================================================================
  # KNOWLEDGE FLOW BACKEND
  # ===========================================================================
  knowledge-flow-backend:
    image:
      tag: "0.1"
    configuration:
      security:
        m2m:
          realm_url: "http://keycloak:8080/realms/app"
        user:
          realm_url: "http://keycloak:8080/realms/app"
        authorized_origins:
          - "http://localhost:8088"
        rebac:
          enabled: false
          api_url: "http://openfga:9080"
      scheduler:
        temporal:
          host: "temporal:7233"
      content_storage:
        type: minio
        endpoint: http://minio:9000
        access_key: "admin"
        bucket_name: "app-content"
        secure: false
      storage:
        tabular_stores:
          base_database:
            type: "sql"
            mode: "read_and_write"
            driver: "postgresql+psycopg2"
            host: "postgres"
            port: 5432
            database: "data"
            path: null
            username: "tabular"
        postgres:
          <<: *POSTGRES_COMMON
          pool_size: 2
          max_overflow: 0
          pool_timeout: 30
          pool_recycle: 1800
          pool_pre_ping: true
        opensearch: *OPENSEARCH_COMMON
        catalog_store:
          type: "postgres"
          table: catalog
        prompt_store:
          type: "postgres"
          table: prompt
        resource_store:
          type: "postgres"
          table: resource
        tag_store:
          type: "postgres"
          table: tag
        metadata_store:
          type: "postgres"
          table: metadata
        task_store:
          type: "postgres"
          table: workflow_tasks
          prefix: "sched_"
        vector_store:
          type: opensearch
          index: vector-index
          bulk_size: 1000
        log_store:
          type: "in_memory"

      filesystem:
        type: minio
        endpoint: http://minio:9000
        access_key: admin
        bucket_name: filesystem
        secure: false

    # -------------------------------------------------------------------------
    # Knowledge Flow Backend — Secrets (.env)
    # -------------------------------------------------------------------------
    dotenv: &KF_CONFIG
      KEYCLOAK_KNOWLEDGE_FLOW_CLIENT_SECRET: "Azerty123_"
      MINIO_SECRET_KEY: "Azerty123_"
      OPENAI_API_KEY: "123"                     # <-- fill with your OpenAI key
      OPENSEARCH_PASSWORD: "FredDemo_2026!"
      OPENFGA_API_TOKEN: "Azerty123_"
      FRED_POSTGRES_PASSWORD: "Azerty123_"
      TABULAR_POSTGRES_PASSWORD: "Azerty123_"

  # ===========================================================================
  # KNOWLEDGE FLOW WORKER
  # ===========================================================================
  knowledge-flow-worker:
    enabled: true
    deployment:
      enabled: true
    image:
      tag: "0.1"
      
    configuration:
      scheduler:
        temporal:
          host: "temporal:7233"
      content_storage:
        type: minio
        endpoint: http://minio:9000
        access_key: "admin"
        bucket_name: "app-content"
        secure: false
    dotenv: *KF_CONFIG
