app:
  name: Control Plane Backend
  base_url: /control-plane/v1
  address: 0.0.0.0
  port: 8222
  log_level: info

scheduler:
  enabled: true
  backend: temporal
  temporal:
    host: temporal:7233
    namespace: default
    task_queue: control-plane-lifecycle
    workflow_id_prefix: control-plane
    connect_timeout_seconds: 5

security:
  m2m:
    enabled: true
    realm_url: http://app-keycloak:8080/realms/app
    client_id: control-plane
    secret_env_var: KEYCLOAK_CONTROL_PLANE_CLIENT_SECRET # pragma: allowlist secret
  user:
    enabled: true
    realm_url: http://app-keycloak:8080/realms/app
    client_id: app
  authorized_origins:
    - http://localhost:5173

storage:
  postgres:
    host: localhost
    port: 5432
    database: fred
    username: fred
  session_store:
    type: postgres
    table: session
  purge_queue_table: session_purge_queue

policies:
  purge_catalog_path: ./conversation_policy_catalog.yaml
