version: v1

agents:
  - id: "Rico"
    name: "Rico"
    type: "agent"
    class_path: "agentic_backend.agents.rags.rag_expert.Rico"
    enabled: true
    chat_options:
      search_policy_selection: true
      libraries_selection: true
      search_rag_scoping: true
      deep_search_delegate: false
      attach_files: true
      include_corpus_in_search: true

  - id: "Archie"
    name: "Archie"
    type: "agent"
    class_path: "agentic_backend.agents.rags.archie.Archie"
    enabled: true
    chat_model: {}
    chat_options:
      search_policy_selection: true
      libraries_selection: true
      search_rag_scoping: true
      attach_files: true

  - id: "Tessa"
    name: "Tessa"
    type: "agent"
    class_path: "agentic_backend.agents.v1.production.tabular.tabular_expert.Tessa"
    enabled: true

  - id: "SlideMaker"
    name: "SlideMaker"
    type: "agent"
    class_path: "agentic_backend.agents.v1.samples.slide_maker.agent.Definition"
    enabled: true

  - id: "SlideMakerV2"
    name: "SlideMakerV2"
    type: "agent"
    class_path: "agentic_backend.agents.v2.samples.slide_maker.agent.Definition"
    enabled: true

  - id: "SQL Agent"
    name: "SQL Agent"
    type: "agent"
    class_path: "agentic_backend.agents.v2.candidate.sql_analyst_graph.sql_agent_definition.SqlAgentDefinition"
    enabled: true

  - id: "Corpus Investigator Deep"
    name: "Corpus Investigator Deep"
    type: "agent"
    definition_ref: "v2.deep.corpus_investigator"

  - id: "BankTransferDemo"
    name: "BankTransferDemo"
    type: "agent"
    class_path: "agentic_backend.banking.agent.BankTransferWorkflowAgent"
    enabled: true

react_profiles:
  - profile_id: "base_assistant"
    enabled: true
  - profile_id: "custodian"
    enabled: true
  - profile_id: "rag_expert"
    enabled: true
  - profile_id: "sentinel"
    enabled: true
  - profile_id: "log_genius"
    enabled: true
