version: v1

common_model_settings:
  max_retries: 0
  timeout:
    connect: 10.0
    read: 120.0
    write: 30.0
    pool: 5.0
  http_client_limits:
    max_connections: 500
    max_keepalive_connections: 200
    keepalive_expiry_seconds: 10
  temperature: 0.0

default_profile_by_capability:
  chat: default.chat.openai.prod
  language: default.language.openai.prod

profiles:
  - profile_id: default.chat.openai.prod
    capability: chat
    model:
      provider: openai
      name: gpt-5.1
      settings: {}

  - profile_id: default.language.openai.prod
    capability: language
    model:
      provider: openai
      name: gpt-5.1
      settings: {}

  - profile_id: default.chat.local
    capability: chat
    model:
      provider: openai
      name: gpt-5.1
      settings:
        max_retries: 2
        request_timeout: 90
        temperature: 0.0

  - profile_id: default.language.local
    capability: language
    model:
      provider: openai
      name: gpt-5.1
      settings:
        max_retries: 2
        request_timeout: 90
        temperature: 0.0

  - profile_id: chat.azure_apim.gpt4o
    capability: chat
    model:
      provider: azure-apim
      name: gpt-4o
      settings:
        azure_apim_base_url: "https://trustnest.azure-api.net"
        azure_apim_resource_path: "/genai-aoai-inference/v2"
        azure_openai_api_version: "2024-06-01"
        azure_tenant_id: "${AZURE_TENANT_ID}"
        azure_ad_client_id: "${AZURE_AD_CLIENT_ID}"
        azure_ad_client_scope: "${AZURE_AD_CLIENT_SCOPE}"

  - profile_id: chat.ollama.mistral
    capability: chat
    model:
      provider: ollama
      name: "mistral:latest"
      settings:
        base_url: "http://host.docker.internal:11434"

  - profile_id: language.ollama.mistral
    capability: language
    model:
      provider: ollama
      name: "mistral:latest"
      settings:
        base_url: "http://host.docker.internal:11434"

rules: []
