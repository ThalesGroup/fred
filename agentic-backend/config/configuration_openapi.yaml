# OpenAPI generation-only configuration.
# Purpose: keep schema generation deterministic and independent from catalogs.

app:
  name: "Agentic Backend"
  base_url: "/agentic/v1"
  address: "127.0.0.1"
  port: 8000
  log_level: "info"
  reload: false
  reload_dir: "."
  metrics_enabled: false
  metrics_address: "127.0.0.1"
  metrics_port: 9005

scheduler:
  enabled: true
  backend: temporal
  temporal:
    host: "localhost:7233"
    namespace: "default"
    task_queue: "agents"

security:
  m2m:
    enabled: false
    client_id: "agentic"
    realm_url: "http://localhost:8080/realms/app"
  user:
    enabled: false
    client_id: "app"
    realm_url: "http://localhost:8080/realms/app"
  authorized_origins:
    - "http://localhost:5173"

frontend_settings:
  feature_flags:
    enableK8Features: false
    enableElecWarfare: false
  properties:
    logoName: "fred"
    siteDisplayName: "Fred"

ai:
  use_static_config_only: true
  enable_v2_sql_checkpointer: false
  restore_max_exchanges: 20
  max_concurrent_agents: 1024
  max_concurrent_sessions_per_user: 10
  max_attached_files_per_user: 20
  max_attached_file_size_mb: 50
  knowledge_flow_url: "http://localhost:8111/knowledge-flow/v1"
  timeout:
    connect: 5
    read: 15
  default_chat_model:
    provider: "openai"
    name: "gpt-5-mini"
    settings:
      temperature: 0.0
  default_language_model:
    provider: "openai"
    name: "gpt-5-mini"
    settings:
      temperature: 0.0
  recursion:
    recursion_limit: 40
  agents: []

storage:
  postgres:
    sqlite_path: "/tmp/agentic-openapi.sqlite3"

  feedback_store:
    type: "postgres"
    table: feedbacks

  agent_store:
    type: "postgres"
    table: agent

  mcp_servers_store:
    type: "postgres"
    table: mcp-server

  session_store:
    type: "postgres"
    table: session

  attachments_store:
    type: "postgres"
    table: session_attachments

  history_store:
    type: "postgres"
    table: session_history

  task_store:
    type: "postgres"
    table: tasks

  kpi_store:
    type: "log"
    level: "DEBUG"

  log_store:
    type: "in_memory"
