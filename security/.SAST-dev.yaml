# SAST for application code (Python, TypeScript, TSX, JavaScript)
# Based on: https://gitlab.com/gitlab-org/gitlab/-/blob/master/lib/gitlab/ci/templates/Jobs/SAST.gitlab-ci.yml
# Only semgrep-sast is retained — gitlab-advanced-sast is not available.

variables:
  SECURE_ANALYZERS_PREFIX: "$CI_TEMPLATE_REGISTRY_HOST/security-products"
  SAST_IMAGE_SUFFIX: ""
  SAST_EXCLUDED_ANALYZERS: ""
  SAST_EXCLUDED_PATHS: "spec, test, tests, tmp"

sast:
  stage: sast
  artifacts:
    access: 'developer'
    reports:
      sast: gl-sast-report.json
    paths: [gl-sast-report.json]
  rules:
    - when: never
  variables:
    SEARCH_MAX_DEPTH: 4
  script:
    - echo "$CI_JOB_NAME is used for configuration only, and its script should not be executed"
    - exit 1

.sast-analyzer:
  extends: sast
  allow_failure: true
  script:
    - /analyzer run

semgrep-sast:
  extends: .sast-analyzer
  image:
    name: "$SAST_ANALYZER_IMAGE"
  variables:
    SEARCH_MAX_DEPTH: 20
    SAST_ANALYZER_IMAGE_TAG: 6
    SAST_ANALYZER_IMAGE: "$SECURE_ANALYZERS_PREFIX/semgrep:$SAST_ANALYZER_IMAGE_TAG$SAST_IMAGE_SUFFIX"
  rules:
    - if: $SAST_DISABLED == 'true' || $SAST_DISABLED == '1'
      when: never
    - if: $SAST_EXCLUDED_ANALYZERS =~ /semgrep/
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      exists:
        - '**/{*.py,*.js,*.jsx,*.ts,*.tsx,*.cjs,*.mjs}'
    - if: $CI_COMMIT_BRANCH
      exists:
        - '**/{*.py,*.js,*.jsx,*.ts,*.tsx,*.cjs,*.mjs}'
