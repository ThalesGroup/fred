version: "3.9"

services:
  openfga:
    image: openfga/openfga:latest
    command:
      - "run"
    environment:
      OPENFGA_HTTP_ADDR: 0.0.0.0:7080
      OPENFGA_GRPC_ADDR: 0.0.0.0:7081
      OPENFGA_PLAYGROUND_PORT: 4000
      OPENFGA_API_TOKEN: test-token
    ports:
      - "7080:7080"
      - "7081:7081"
      - "4000:4000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fred
      POSTGRES_USER: fred
      POSTGRES_PASSWORD: fred
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fred -d fred"]
      interval: 5s
      timeout: 5s
      retries: 10
