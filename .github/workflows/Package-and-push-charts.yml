name: Package and push Helm Charts

on:
  push:
    branches:
      - main
    tags: ["[0-9]+.[0-9]+.[0-9]+*"]

env:
  REGISTRY: ghcr.io

jobs:
  package-and-push:
    name: Package and push ${{ matrix.name }} chart
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: fred
            chart_path: ./deploy/charts/fred
            registry_name: fred

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set version
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.0-dev" >> $GITHUB_OUTPUT
          fi

      - name: Set version in all components
        run: make set-version VERSION=${{ steps.version.outputs.version }}

      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: Login to Helm registry
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Package chart ${{ matrix.name }}
        run: |
          helm package ${{ matrix.chart_path }} \
            --version ${{ steps.version.outputs.version }} \
            --destination ./packages

      - name: Push ${{ matrix.name }} to registry
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm push ./packages/${{ matrix.registry_name }}-${{ steps.version.outputs.version }}.tgz oci://${{ env.REGISTRY }}/${REPO_OWNER}/fred-helm

  create-release:
    name: Create GitHub Release
    if: github.ref_type == 'tag'
    needs: package-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Helm Charts Release ${{ github.ref_name }}
          body: |
            ## Setup

            ```bash
            helm install fred oci://ghcr.io/thalesgroup/fred-helm/fred --version ${{ github.ref_name }}
            ```
          draft: false
          prerelease: false
