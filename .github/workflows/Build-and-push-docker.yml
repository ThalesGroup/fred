name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags: ["[0-9]+.[0-9]+.[0-9]+*"]
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and push ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: agentic-backend
            context: ./
            dockerfile: ./agentic-backend/dockerfiles/Dockerfile-prod
            image: agentic-backend
          - name: knowledge-flow-backend
            context: ./
            dockerfile: ./knowledge-flow-backend/dockerfiles/Dockerfile-prod
            image: knowledge-flow-backend
          - name: control-plane-backend
            context: ./
            dockerfile: ./control-plane-backend/dockerfiles/Dockerfile-prod
            image: control-plane-backend
          - name: frontend
            context: ./
            dockerfile: ./frontend/dockerfiles/Dockerfile-prod
            image: frontend

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Login to Github Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/thalesgroup/fred-agent/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=dev,enable=${{ github.ref_type == 'branch' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          build-args: |
            PRODUCTION_FASTAPI_DOCS_ENABLED=${{ github.ref_type == 'branch' }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  create-release:
    name: Create GitHub Release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Images

            ```
            oci://${{ env.REGISTRY }}/thalesgroup/fred-agent/agentic-backend:${{ github.ref_name }}
            oci://${{ env.REGISTRY }}/thalesgroup/fred-agent/knowledge-flow-backend:${{ github.ref_name }}
            oci://${{ env.REGISTRY }}/thalesgroup/fred-agent/control-plane-backend:${{ github.ref_name }}
            oci://${{ env.REGISTRY }}/thalesgroup/fred-agent/frontend:${{ github.ref_name }}
            ```
          draft: false
          prerelease: false
