    review_status: external_or_public
    required_permission: bootstrap_token # authenticated (Keycloak JWT required) but not ReBAC-gated — grants only the caller's own sub, gated by a deploy-time secret (RFC Part 8, AUTHZ-07); permanently inert once a durable completion marker is set (not a live platform_admin count)
  - service: control-plane
