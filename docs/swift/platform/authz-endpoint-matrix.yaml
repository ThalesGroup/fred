# AUTHZ-05 endpoint authorization matrix.
#
# This file is the canonical review ledger for HTTP authorization decisions.
# The first invariant is coverage: every published backend operation must appear
# here exactly once. The initial entries are deliberately marked
# `pending_review`; a route is not approved just because it is listed.
#
# Review status values:
# - pending_review: route is inventoried but its exact permission is not approved yet.
# - approved: route permission was reviewed and locked by focused tests.
# - external_or_public: route intentionally does not use Fred user ReBAC.
#
# Required permission values should converge on concrete Fred permissions, for
# example `organization.can_manage_platform`, `team.can_update_agents`,
# `tag.update`, or `document.read`.

