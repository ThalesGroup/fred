# docs/data/sprint.yaml
#
# Machine-readable sprint state. Source of truth for structured queries.
# AI assistants: read this file for any question about progress, ownership,
# blockers, or milestone completion — it is faster than parsing prose docs.
#
# Humans: update this file at the same time you update STATUS.md or a backlog
# checkbox. Both files must stay in sync (id-legend.yaml owns the full history;
# sprint.yaml owns the live sprint window only).
