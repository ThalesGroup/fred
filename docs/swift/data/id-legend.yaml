    notes: >
      Adds locked: bool to MCPServerRef (fred-sdk) and ManagedMcpServerRef (control-plane).
      Specialized templates set locked=True on their MCPServerRef entries so the enrollment
      form shows the server but renders its toggle as read-only. Sentinel is the first template
      to use this. General assistant keeps all servers unlocked.

  - id: CTRLP-08
    title: "Tool-declared behavioral contracts — agent_instructions in mcp_catalog.yaml"
    status: done
    owner: Simon
    parent: CTRLP-03
    closed: "2026-05-22"
    refs:
      rfc: "docs/swift/rfc/MCP-CATALOG-CONFIG-FIELDS-RFC.md §8"
      backlog: "docs/swift/backlog/BACKLOG.md §3.14"
    notes: >
      Mandatory behavioral constraints (e.g., citation rules for search tools) declared
      in the MCP catalog entry as agent_instructions and injected by the runtime into the
      effective system prompt whenever that server is active. Operator prompts cannot
      override these — they are appended after. Removes the fragility of encoding tool
      behavior in agent-level prompts. Three changes: (1) agent_instructions field in
      mcp_catalog.yaml for mcp-knowledge-flow-mcp-text; (2) agent_instructions: str | None
      on MCPServerConfiguration in fred-sdk; (3) injection block in _apply_runtime_tuning
      in agent_app.py.

