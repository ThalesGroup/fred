      Périmètre : control-plane-backend users/ et teams/ (listing uniquement) +
      knowledge-flow-backend users_service.py (via HTTP control-plane).
      Phases : (1) migration Alembic, (2) modèles, (3) service users,
      (4) service teams listing, (5) knowledge-flow-backend.

  - id: CTRLP-12
    title: "Fred 2.0.2 — RGPD-ready increment (complete erasure + team-governed retention + governed evaluation)"
    status: open
    owner: Dimitri
    refs:
      rfc: "docs/swift/rfc/FRED-2.0.2-RGPD-READY-RFC.md"
      backlog: "docs/swift/backlog/BACKLOG.md §6.4.H"
      execution: "branch 1883-fred-202-rgpd-ready-increment-ctrlp-12"
    notes: >
      The release increment that makes Fred RGPD-ready, as 2.0.1 made it C3-ready.
      All core capabilities already exist; this wires them together. ONE RFC, ONE
      issue. Rev. 2 target correction (2026-07-03): keep the immediate
      ConversationErasureService + ErasureReceipt core and KPI anonymise fix; remove
      the additive team_policy_override table and dedicated /retention endpoints.
      Per-team retention lives as fields on existing team_metadata, exposed through
      GET/PATCH /teams/{id}, and included in platform import/export with team
      branding/settings. Deferred delete is not enabled and not defaulted until
      server-initiated erase-at-expiry is complete: AUTHZ-01 can_manage_platform
      admin branch on runtime/KF delete endpoints, control-plane service token,
      lifecycle erase_session with queue done only on receipt.ok. checkpoint_thread_owner
      is introduced only with its reader/consumer. Evaluation authz still closes the
      EVAL-01 gap (CAN_READ / CAN_UPDATE_AGENTS / CAN_READ_CONVERSATIONS). Feature:
      the retention window IS the evaluation window — evaluate agents on real
      conversations without compromising RGPD. Coordinate checkpoint schema with
      MEMORY-02 and eval authz with EVAL-01 (Odélia).

