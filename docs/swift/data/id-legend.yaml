# docs/swift/data/id-legend.yaml
#
# Canonical registry of every tracked item in the project.
# AI assistants: read this file first when answering "what is X?", "who
# owns Y?", or "what is the status of Z?".
#
# Convention: id is `DOMAIN-NN` (e.g. MEMORY-02, PROMPT-04). Domain codes
# are listed in meta.domains. See CLAUDE.md § Task IDs for the full rule.

meta:
  last_updated: "2026-06-29"
  id_format: "DOMAIN-NN where DOMAIN is a 4-7 letter code, NN is two-digit sequential"
  status_values: [open, in_progress, done, deferred, not_started]
  domains:
    AUTHZ:   "Authorization model — RBAC→ReBAC migration, OpenFGA schema, authz teardown"
    CHAT:    "Chat UI — options panel, attachments, sessions, rendering"
    CTRLP:   "Control plane — APIs, sessions, instances, lifecycle, MCP"
    EVAL:    "Agent evaluation, scoring, harness"
    FILES:   "Agent filesystem — virtual FS, file exchange, upload/download, LinkPart rendering"
    FRONT:   "Frontend migration and refactor (excluding chat UI)"
    INGEST:  "Knowledge Flow ingestion pipeline — document processors, shared blocks, plugin system, vectorization pipeline"
    MEMORY:  "Multi-agent conversational memory"
    MIGR:    "Kea→Swift production cutover — cherry-picks, DB migrations, feature parity"
    OBSERV:  "Observability, metrics, Prometheus, KPIs"
    OPS:     "CLI, deployment, environment ops"
    PROMPT:  "Prompt safety, library, context picker, marketplace"
    QUALITY: "Quality refactors — typing, file size, test coverage"
    RUNTIME: "Execution contracts, SDK, ChatContext, runtime CLI"
    TEAM:    "Team configuration — platform policy, routing policy, prompt governance"
    UX:      "UX audit, design system compliance, visual polish — all surfaces"
    VALID:   "End-to-end validation, live-stack scenarios"
  rules:
    - "One ID = one tracked unit of work (has or could have owner/status/blockers)."
    - "Sub-tasks live in the backlog file referenced under refs.backlog."

items:

  # ── AUTHZ ─────────────────────────────────────────────────────────────

  - id: AUTHZ-01
    title: "Full RBAC → ReBAC migration (eliminate role-based authorization)"
    status: in_progress
    owner: Simon
    refs:
      rfc: "docs/swift/rfc/RBAC-TO-REBAC-MIGRATION-RFC.md"
      backlog: "docs/swift/backlog/AUTHZ-MIGRATION-BACKLOG.md"
      execution: "GitHub issue #1875"
    notes: >
      Umbrella. Audit found two parallel authz systems; goal is ReBAC-only.
      RBAC surface to remove: 78 @authorize, 61 authorize_or_raise, 20 require_admin,
      2 is_authorized (~20 files). Ownership checks (require_task_access, session
      ownership) are kept (not RBAC). Fine-grained org-level permissions chosen.

  - id: AUTHZ-02
    title: "Org-level OpenFGA schema extension + permission enums"
    status: done
    owner: Simon
    parent: AUTHZ-01
    refs:
      rfc: "docs/swift/rfc/RBAC-TO-REBAC-MIGRATION-RFC.md §3.1/§3.2"
      backlog: "docs/swift/backlog/AUTHZ-MIGRATION-BACKLOG.md"
    notes: >
      Additive permissions on the existing organization type (can_read_kpi/logs/
      metrics/opensearch/knowledge_graph → viewer; can_administer_users/
      can_manage_platform/can_run_benchmark → admin); regenerate schema.fga.json;
      add DocumentPermission.PROCESS + OrganizationPermission members.

  - id: AUTHZ-03
    title: "Endpoint migration to ReBAC (buckets A/B/C)"
    status: done
    owner: Simon
    parent: AUTHZ-01
    blocked_on: AUTHZ-02
    refs:
      backlog: "docs/swift/backlog/AUTHZ-MIGRATION-BACKLOG.md"
    notes: >
      A = instance-scoped check_user_permission_or_raise; B = collections via
      lookup_user_resources (+ drop residual @authorize); C = org-level checks for
      global/admin endpoints.

  - id: AUTHZ-04
    title: "RBAC machinery teardown"
    status: done
    owner: Simon
    parent: AUTHZ-01
    blocked_on: AUTHZ-03
    refs:
      backlog: "docs/swift/backlog/AUTHZ-MIGRATION-BACKLOG.md"
