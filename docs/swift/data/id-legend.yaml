    notes: >
      Amendment to RUNTIME-04 resolving open question 3 (ReAct agent surface).
      Layer 1: runtime auto-synthesises THOUGHT_START/END around every tool
      call/result pair in _TransportBackedReActExecutor — zero author code
      required, all models, all MCP tools.
