  - id: FRONT-10
    title: "Fix CGU/GCU chicken-and-egg — serve gcu_version on the public pre-auth /frontend/config"
    status: done
    owner: Dimitri
    parent: FRONT-08
    refs:
      rfc: "docs/swift/rfc/FRONTEND-AUTH-CONFIG-ENDPOINT-RFC.md §7"
      backlog: "docs/swift/backlog/FRONTEND-BACKLOG.md §16"
      execution: "branch 1793-unified-virtual-filesystem (dev release fix)"
    notes: >
      The GCU guard read the active gcu_version from the authenticated
      /frontend/bootstrap, but that endpoint 403s (user_not_accept_gcu) until the
      user has already accepted — a chicken-and-egg that hid the version needed to
      render the acceptance page. Symptom on swift: the CGU screen was skipped
      (!gcuVersion short-circuit) and bootstrap-backed pages showed "Control plane
      non accessible". Fix extends the existing FRONT-08 public pre-auth surface:
      FrontendConfig now carries gcu_version (effective value — null when user auth
      is disabled or no version configured, so no-CGU/standalone deployments are
      never gated), and the frontend reads it via getGcuVersion() at Stage 0
      instead of from the bootstrap. The bootstrap keeps gcu_version as a post-auth
      informational mirror (CLI display).

