      execution: "PR #1914 (branch 1883-fred-202-rgpd-ready-increment-ctrlp-12)"
    notes: >
      Shipped in v2.0.2 (#1914). Deleting a conversation is now provably erased, not
      just hidden: ConversationErasureService.erase_session fans out over every store
      (transcript, runtime checkpoint, attachments + Knowledge Flow embeddings) and
      returns an auditable ErasureReceipt; KPI usage is anonymised rather than deleted;
      the metadata row is deleted last so a partial failure stays retryable. Per-team
      retention lives on team_metadata (GET/PATCH /teams/{id}, platform-capped, default
      immediate-delete), and the retention window doubles as the governed evaluation
      window. Deferred delete is server-initiated (control-plane service bearer on the
      can_manage_platform branch) and converges via a Temporal-reconciled purge queue
      (queue row marked done only on receipt.ok); erasure never auto-fails but flags
      `stalled` after N attempts. Platform and team admins get an erasure schedule
      (scheduled / in progress / completed, with outcome-accurate labels). Bundled the
      additive DOC-RENAME and DOC-TAGS document features.
      Deferred follow-ups (not in 2.0.2): member-removal task emission; real-conversation
      evaluation execution + cancel; evaluation authz gap (EVAL-01).

