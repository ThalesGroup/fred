<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alembic Migration Graph — Kea vs Swift</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #0e1117;
      --surface:       #161b22;
      --border:        #30363d;
      --text:          #e6edf3;
      --muted:         #7d8590;
      --kea-hue:       210;
      --swift-hue:     145;
      --shared-hue:    45;
      --kea-color:     hsl(var(--kea-hue), 70%, 55%);
      --swift-color:   hsl(var(--swift-hue), 60%, 50%);
      --shared-color:  hsl(var(--shared-hue), 85%, 55%);
      --kea-bg:        hsl(var(--kea-hue), 70%, 12%);
      --swift-bg:      hsl(var(--swift-hue), 60%, 11%);
      --shared-bg:     hsl(var(--shared-hue), 70%, 11%);
      --kea-border:    hsl(var(--kea-hue), 60%, 30%);
      --swift-border:  hsl(var(--swift-hue), 50%, 25%);
      --shared-border: hsl(var(--shared-hue), 65%, 35%);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    header h1 { font-size: 15px; font-weight: 600; }

    .legend {
      display: flex;
      gap: 12px;
      margin-left: auto;
      font-size: 12px;
    }

    .legend-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }

    /* ── Layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      flex-shrink: 0;
      padding: 8px 0;
    }

    .sidebar-version {
      padding: 6px 12px 2px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .sidebar-backend {
      padding: 4px 12px 4px 20px;
      font-size: 13px;
      cursor: pointer;
      border-radius: 4px;
      margin: 1px 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-backend:hover { background: var(--surface); }

    .sidebar-backend.active {
      background: var(--surface);
      font-weight: 600;
      color: var(--text);
    }

    .badge {
      float: right;
      font-size: 11px;
      background: #ffffff14;
      border-radius: 10px;
      padding: 0 6px;
      color: var(--muted);
    }

    /* ── Graph canvas ── */
    .canvas-wrap {
      flex: 1;
      overflow: auto;
      position: relative;
    }

    svg#graph {
      display: block;
      /* sized dynamically */
    }

    /* ── Node styles ── */
    .node-box {
      rx: 6;
      ry: 6;
      cursor: pointer;
    }

    .node-box.kea    { fill: var(--kea-bg);    stroke: var(--kea-border); }
    .node-box.swift  { fill: var(--swift-bg);  stroke: var(--swift-border); }
    .node-box.shared { fill: var(--shared-bg); stroke: var(--shared-border); }
    .node-box.merge  { fill: #1a1a2e; stroke: #555; stroke-dasharray: 4 2; }

    .node-box:hover { filter: brightness(1.3); }

    .node-id {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 11px;
      fill: var(--muted);
    }

    .node-desc {
      font-size: 12px;
      font-weight: 600;
    }

    .node-desc.kea    { fill: var(--kea-color); }
    .node-desc.swift  { fill: var(--swift-color); }
    .node-desc.shared { fill: var(--shared-color); }
    .node-desc.merge  { fill: #aaa; }

    .node-date {
      font-size: 10px;
      fill: var(--muted);
    }

    .edge { fill: none; stroke-width: 1.5; }
    .edge.kea    { stroke: var(--kea-border); }
    .edge.swift  { stroke: var(--swift-border); }
    .edge.shared { stroke: var(--shared-border); }
    .edge.merge  { stroke: #444; stroke-dasharray: 4 2; }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      max-width: 340px;
      pointer-events: none;
      display: none;
      z-index: 100;
      line-height: 1.6;
    }

    #tooltip .tip-id   { font-family: monospace; color: var(--muted); font-size: 11px; }
    #tooltip .tip-desc { font-weight: 600; margin: 2px 0; }
    #tooltip .tip-date { color: var(--muted); font-size: 11px; }
    #tooltip .tip-par  { color: var(--muted); font-size: 11px; margin-top: 4px; }

    /* ── Empty state ── */
    .empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>

<header>
  <h1>Alembic Migration Graph</h1>

    <span><span class="legend-dot" style="background:var(--kea-color)"></span>Kea only</span>

    <span><span class="legend-dot" style="background:var(--shared-color)"></span>Both</span>
    <span><span class="legend-dot" style="background:#555;border:1px dashed #888"></span>Merge</span>
  </div>
</header>

<div class="main">

/* ── Sidebar ─────────────────────────────────────────────────────────────── */
function buildSidebar(data) {
  // Collect unique backend names in order (preserving first-seen order)
  const backendNames = [];
  for (const versionData of Object.values(data)) {
    for (const backend of versionData.backends) {
      if (!backendNames.includes(backend.name)) backendNames.push(backend.name);
    }
  }

  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';

  const label = document.createElement('div');
  label.className = 'sidebar-version';
  label.textContent = 'BACKENDS';
  sidebar.appendChild(label);

  for (const name of backendNames) {
    const keaBackend   = data.kea?.backends.find(b => b.name === name);
    const swiftBackend = data.swift?.backends.find(b => b.name === name);
    const total = (keaBackend?.nodes.length || 0) + (swiftBackend?.nodes.length || 0);

    const el = document.createElement('div');
    el.className = 'sidebar-backend';
    el.innerHTML = `${name} <span class="badge">${total}</span>`;
    el.addEventListener('click', () => {
      document.querySelectorAll('.sidebar-backend').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
      renderSideBySide(keaBackend?.nodes || [], swiftBackend?.nodes || []);
    });
    sidebar.appendChild(el);
  }
}

/* ── Layout: topological sort, bottom-to-top ─────────────────────────────── */
function layoutNodes(nodes) {
  const byId = {};
  nodes.forEach(n => { byId[n.id] = n; });

  const childrenOf = {};
  const parentCount = {};
  nodes.forEach(n => { childrenOf[n.id] = []; parentCount[n.id] = 0; });
  nodes.forEach(n => {
    n.parents.forEach(pid => {
      if (byId[pid]) {
        childrenOf[pid].push(n.id);
        parentCount[n.id]++;
      }
    });
  });

  // Kahn — assign depth (0 = root/oldest)
  const depth = {};
  const queue = nodes.filter(n => parentCount[n.id] === 0).map(n => n.id);
  queue.forEach(id => { depth[id] = 0; });

  const order = [];
  while (queue.length) {
    const cur = queue.shift();
    order.push(cur);
    childrenOf[cur].forEach(cid => {
      depth[cid] = Math.max(depth[cid] || 0, (depth[cur] || 0) + 1);
      parentCount[cid]--;
      if (parentCount[cid] === 0) queue.push(cid);
    });
  }

  const maxDepth = Math.max(0, ...Object.values(depth));

  // Group by depth, then assign positions:
  //   depth=0 (oldest) → bottom row,  depth=maxDepth (HEAD) → top row
  //   siblings spread horizontally
  const rows = {};
  order.forEach(id => {
    const d = depth[id] || 0;
    if (!rows[d]) rows[d] = [];
    rows[d].push(id);
  });

  const NODE_W = 240, NODE_H = 64, H_GAP = 24, V_GAP = 48;
  const HEADER_H = 32; // space reserved for the version label at top

  // Max siblings at any depth → total SVG width
  const maxSiblings = Math.max(1, ...Object.values(rows).map(r => r.length));

  const positions = {};
  Object.entries(rows).forEach(([d, ids]) => {
    const di = parseInt(d);
    // y: depth=0 (oldest/root) at top, depth=maxDepth (HEAD) at bottom
    const row = di;
    const totalW = ids.length * NODE_W + (ids.length - 1) * H_GAP;
    ids.forEach((id, col) => {
      const xOffset = col * (NODE_W + H_GAP);
      // Centre the siblings horizontally within the available width
      const avail = maxSiblings * NODE_W + (maxSiblings - 1) * H_GAP;
      const startX = (avail - totalW) / 2;
      positions[id] = {
        x: startX + xOffset,
        y: HEADER_H + row * (NODE_H + V_GAP),
      };
    });
  });

  const totalW = maxSiblings * NODE_W + (maxSiblings - 1) * H_GAP;
  const totalH = HEADER_H + (maxDepth + 1) * (NODE_H + V_GAP);

  return { positions, order, NODE_W, NODE_H, totalW, totalH };
}

/* ── SVG helpers ─────────────────────────────────────────────────────────── */
const NS = 'http://www.w3.org/2000/svg';

function svgEl(tag, attrs = {}, text = '') {
  const el = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  if (text) el.textContent = text;
  return el;
}

function truncate(s, max) {
  return s && s.length > max ? s.slice(0, max - 1) + '…' : (s || '');
}

function isMerge(node) {
  return node.parents.length > 1 || (node.description || '').toLowerCase().includes('merge');
}

/* ── Render one version's graph into a <g> at offset (offsetX, 0) ───────── */
function renderVersion(nodes, version, offsetX, svgEl2, markerId, sharedIds = new Set()) {
  if (!nodes.length) return { totalW: 300, totalH: 80 };

  const byId = {};
  nodes.forEach(n => { byId[n.id] = n; });

  const { positions, order, NODE_W, NODE_H, totalW, totalH } = layoutNodes(nodes);

  // Version label
  const labelColor = version === 'kea' ? 'var(--kea-color)' : 'var(--swift-color)';
  const lbl = svgEl('text', {
    x: offsetX + totalW / 2,
    y: 20,
    'text-anchor': 'middle',
    'font-size': '13',
    'font-weight': '700',
    fill: labelColor,
  }, version === 'kea' ? 'Kea' : 'Swift');
  svgEl2.appendChild(lbl);

  // Edges
  nodes.forEach(node => {
    node.parents.forEach(pid => {
      const from = positions[pid];
      const to   = positions[node.id];
      if (!from || !to) return;

      // top-to-bottom: edges go from bottom-center of parent down to top-center of child
      const x1 = offsetX + from.x + NODE_W / 2;
      const y1 = from.y + NODE_H;
      const x2 = offsetX + to.x + NODE_W / 2;
      const y2 = to.y;
      const cy = (y1 + y2) / 2;

      const edgeClass = isMerge(node) ? 'merge'
        : (sharedIds.has(node.id) && sharedIds.has(pid)) ? 'shared'
        : version;
      const edgeMarker = edgeClass === 'shared' ? 'url(#arrow-shared)'
        : edgeClass === 'merge' ? 'url(#arrow-merge)'
        : `url(#${markerId})`;
      const path = svgEl('path', {
        d: `M${x1},${y1} C${x1},${cy} ${x2},${cy} ${x2},${y2}`,
        class: `edge ${edgeClass}`,
        'marker-end': edgeMarker,
      });
      svgEl2.appendChild(path);
    });
  });

  // Nodes
  order.forEach(id => {
    const node = byId[id];
    if (!node) return;
    const pos = positions[id];
    const merge = isMerge(node);
    const cls = merge ? 'merge' : sharedIds.has(node.id) ? 'shared' : version;

    const g = svgEl('g', { class: 'node', transform: `translate(${offsetX + pos.x},${pos.y})` });

    g.appendChild(svgEl('rect', {
      class: `node-box ${cls}`,
      width: NODE_W, height: NODE_H,
      'stroke-width': 1.5,
      rx: 6, ry: 6,
    }));
    g.appendChild(svgEl('text', { class: 'node-id',         x: 10, y: 18 }, node.id));
    g.appendChild(svgEl('text', { class: `node-desc ${cls}`, x: 10, y: 36 },
      truncate(node.description || node.filename.replace(/^[a-f0-9]+_/, ''), 30)));
    if (node.create_date) {
      g.appendChild(svgEl('text', { class: 'node-date', x: 10, y: 52 }, node.create_date.slice(0, 10)));
    }

    g.addEventListener('mouseenter', (e) => showTooltip(e, node));
    g.addEventListener('mouseleave', hideTooltip);
    g.addEventListener('mousemove', moveTooltip);

    svgEl2.appendChild(g);
  });

  return { totalW, totalH };
}

/* ── Render Kea + Swift side by side ─────────────────────────────────────── */
function renderSideBySide(keaNodes, swiftNodes) {
  const svg = document.getElementById('graph');
  const empty = document.getElementById('empty-state');

  if (!keaNodes.length && !swiftNodes.length) {
    svg.style.display = 'none';
    empty.style.display = 'flex';
    empty.textContent = 'No migrations in this backend.';
    return;
  }

  svg.style.display = 'block';
  empty.style.display = 'none';
  svg.innerHTML = '';

  // Two arrowhead markers, one per version
  const defs = svgEl('defs');
  for (const [vid, hue, sat] of [['kea', 210, 60], ['swift', 145, 50]]) {
    const marker = svgEl('marker', {
      id: `arrow-${vid}`, markerWidth: 8, markerHeight: 6,
      refX: 4, refY: 3, orient: 'auto',
    });
    marker.appendChild(svgEl('polygon', {
      points: '0 0, 8 3, 0 6',
      fill: `hsl(${hue},${sat}%,35%)`,
    }));
    defs.appendChild(marker);
  }
  const mergeMarker = svgEl('marker', {
    id: 'arrow-merge', markerWidth: 8, markerHeight: 6,
    refX: 4, refY: 3, orient: 'auto',
  });
  mergeMarker.appendChild(svgEl('polygon', { points: '0 0, 8 3, 0 6', fill: '#444' }));
  defs.appendChild(mergeMarker);

  const sharedMarker = svgEl('marker', {
    id: 'arrow-shared', markerWidth: 8, markerHeight: 6,
    refX: 4, refY: 3, orient: 'auto',
  });
  sharedMarker.appendChild(svgEl('polygon', { points: '0 0, 8 3, 0 6', fill: 'hsl(45,65%,35%)' }));
  defs.appendChild(sharedMarker);
  svg.appendChild(defs);

  const COL_GAP = 48;
  const PADDING = 20;

  // Layout both to get their widths first (we need widths before rendering)
  const keaLayout   = keaNodes.length   ? layoutNodes(keaNodes)   : { totalW: 0, totalH: 0 };
  const swiftLayout = swiftNodes.length ? layoutNodes(swiftNodes) : { totalW: 0, totalH: 0 };

  const keaW   = keaNodes.length   ? keaLayout.totalW   : 0;
  const swiftW = swiftNodes.length ? swiftLayout.totalW : 0;

  const keaOffsetX   = PADDING;
  const dividerX     = PADDING + keaW + COL_GAP / 2;
  const swiftOffsetX = PADDING + keaW + COL_GAP;

  const totalSvgW = PADDING + keaW + (keaW && swiftW ? COL_GAP : 0) + swiftW + PADDING;
  const totalSvgH = Math.max(keaLayout.totalH || 0, swiftLayout.totalH || 0) + PADDING;

  // Divider line
  if (keaW && swiftW) {
    svg.appendChild(svgEl('line', {
      x1: dividerX, y1: 0, x2: dividerX, y2: totalSvgH,
      stroke: 'var(--border)', 'stroke-width': 1,
      'stroke-dasharray': '4 4',
    }));
  }

  const keaIds   = new Set(keaNodes.map(n => n.id));
  const swiftIds = new Set(swiftNodes.map(n => n.id));
  const sharedIds = new Set([...keaIds].filter(id => swiftIds.has(id)));

  if (keaNodes.length)   renderVersion(keaNodes,   'kea',   keaOffsetX,   svg, 'arrow-kea',   sharedIds);
  if (swiftNodes.length) renderVersion(swiftNodes, 'swift', swiftOffsetX, svg, 'arrow-swift', sharedIds);

  svg.setAttribute('width',  totalSvgW);
  svg.setAttribute('height', totalSvgH);
}

/* ── Tooltip ─────────────────────────────────────────────────────────────── */
const tooltip = document.getElementById('tooltip');

function showTooltip(e, node) {
  tooltip.innerHTML = `
    <div class="tip-id">${node.id}</div>
    <div class="tip-desc">${node.description || node.filename}</div>
    <div class="tip-date">Created: ${node.create_date || '—'}</div>
    <div class="tip-par">Parents: ${node.parents.length ? node.parents.join(', ') : 'none (root)'}</div>
  `;
  tooltip.style.display = 'block';
  moveTooltip(e);
}

function hideTooltip() { tooltip.style.display = 'none'; }

function moveTooltip(e) {
  const pad = 12;
  let x = e.clientX + pad, y = e.clientY + pad;
  if (x + tooltip.offsetWidth  > window.innerWidth)  x = e.clientX - tooltip.offsetWidth  - pad;
  if (y + tooltip.offsetHeight > window.innerHeight) y = e.clientY - tooltip.offsetHeight - pad;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}

/* ── Init ─────────────────────────────────────────────────────────────────── */
const data = loadData();
if (data) {
  buildSidebar(data);
  const first = document.querySelector('.sidebar-backend');
  if (first) first.click();
}
</script>
