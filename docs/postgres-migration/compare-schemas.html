    overflow: hidden;
  }

  /* ── Sidebar ── */
  #sidebar {

    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

    padding: 16px 14px 10px;
    border-bottom: 1px solid #30363d;
  }

    font-size: 13px;
    font-weight: 600;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 10px;
  }

  #search {
    width: 100%;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 5px 9px;
    font-size: 13px;
    color: #e6edf3;
    outline: none;
  }
  #search:focus { border-color: #58a6ff; }

  .section-label {
    padding: 10px 14px 4px;
    font-size: 11px;
    font-weight: 600;
    color: #6e7681;
    text-transform: uppercase;
    letter-spacing: .07em;
  }

  #nav {
    overflow-y: auto;
    flex: 1;
    padding-bottom: 12px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 5px 14px;
    font-size: 13px;
    cursor: pointer;
    border-left: 3px solid transparent;
    color: #c9d1d9;
    user-select: none;
  }
  .nav-item:hover { background: #1f262e; }
  .nav-item.active { background: #1f2a3a; border-left-color: #58a6ff; color: #e6edf3; }

  .badge {
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 10px;
    flex-shrink: 0;
  }
  .badge-same    { background: #21262d; color: #8b949e; }
  .badge-renamed { background: #1c3a5e; color: #79c0ff; }
  .badge-new     { background: #1b3a2f; color: #3fb950; }
  .badge-deleted { background: #3a1a1a; color: #f85149; }

  /* ── Main content ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #topbar {
    padding: 14px 20px;
    border-bottom: 1px solid #30363d;
    background: #161b22;
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-shrink: 0;
  }

  #topbar h2 { font-size: 16px; font-weight: 600; }

  #topbar .meta {
    font-size: 12px;
    color: #6e7681;
  }

  #topbar .pill {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .pill-same    { background: #21262d; color: #8b949e; }
  .pill-renamed { background: #1c3a5e; color: #79c0ff; }
  .pill-new     { background: #1b3a2f; color: #3fb950; }
  .pill-deleted { background: #3a1a1a; color: #f85149; }

  #diff-header {
    display: flex;
    border-bottom: 1px solid #30363d;
    flex-shrink: 0;
  }
  .diff-col-label {
    flex: 1;
    padding: 7px 16px;
    font-size: 12px;
    font-weight: 600;
    color: #8b949e;
    background: #0d1117;
    border-right: 1px solid #30363d;
  }
  .diff-col-label:last-child { border-right: none; }

  #editor-container {
    flex: 1;
    min-height: 0;
    position: relative;
    overflow: hidden;
  }

  #welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #6e7681;
    gap: 8px;
    font-size: 14px;
  }
  #welcome .big { font-size: 36px; }

  /* ── Loading ── */
  #loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    font-size: 14px;
    color: #6e7681;
  }
</style>
</head>

<!-- Monaco via CDN -->
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs/loader.js"></script>
<script>
require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs' } });

let diffEditor = null;
let currentMapping = null;

// ── Load data ──────────────────────────────────────────────────────────────
async function loadData() {
  if (!window.MIGRATION_DATA) throw new Error('No data found — run generate.py first to inject data into this file.');
  return window.MIGRATION_DATA;
}

// ── Build sidebar ──────────────────────────────────────────────────────────
function buildNav(mappings, onSelect) {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';

  const sections = [
    { kind: 'renamed', label: 'Renamed' },
    { kind: 'same',    label: 'Unchanged name' },
    { kind: 'new',     label: 'New in Swift' },
    { kind: 'deleted', label: 'Deleted in Swift' },
  ];

  sections.forEach(({ kind, label }) => {
    const items = mappings.filter(m => m.kind === kind);
    if (!items.length) return;

    const sec = document.createElement('div');
    sec.className = 'section-label';
    sec.textContent = label;
    nav.appendChild(sec);

    items.forEach(m => {
      const el = document.createElement('div');
      el.className = 'nav-item';
      el.dataset.kind = kind;

      const name = m.kea_table || m.swift_table;
      const renamed = kind === 'renamed' ? ` → ${m.swift_table}` : '';

      el.innerHTML = `
        <span class="badge badge-${kind}">${kind[0].toUpperCase()}</span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${name}${renamed}">${name}${renamed}</span>
      `;
      el.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        onSelect(m);
      });
      nav.appendChild(el);
    });
  });
}

// ── Filter ─────────────────────────────────────────────────────────────────
function filterNav(query) {
  document.querySelectorAll('#nav .nav-item').forEach(el => {
    const text = el.textContent.toLowerCase();
    el.style.display = text.includes(query.toLowerCase()) ? '' : 'none';
  });
  // Hide empty section labels
  document.querySelectorAll('#nav .section-label').forEach(label => {
    let next = label.nextElementSibling;
    let hasVisible = false;
    while (next && !next.classList.contains('section-label')) {
      if (next.style.display !== 'none') hasVisible = true;
      next = next.nextElementSibling;
    }
    label.style.display = hasVisible ? '' : 'none';
  });
}

// ── Render diff ────────────────────────────────────────────────────────────
function renderDiff(mapping) {
  currentMapping = mapping;

  const topbar = document.getElementById('topbar');
  const diffHeader = document.getElementById('diff-header');
  const editorContainer = document.getElementById('editor-container');
  const welcome = document.getElementById('welcome');

  if (welcome) welcome.style.display = 'none';
  diffHeader.style.display = 'flex';

  // Topbar
  const kindLabel = { same: 'Unchanged', renamed: 'Renamed', new: 'New in Swift', deleted: 'Deleted in Swift' }[mapping.kind];
  const name = mapping.kea_table || mapping.swift_table;
  const renamedNote = mapping.kind === 'renamed' ? ` → <code style="font-size:14px">${mapping.swift_table}</code>` : '';
  topbar.innerHTML = `
    <h2 id="tb-title"><code>${name}</code>${renamedNote}</h2>
    <span class="pill pill-${mapping.kind}">${kindLabel}</span>
  `;

  // Column labels
  document.getElementById('lbl-kea').textContent  = mapping.kea_table  ? `Kea — ${mapping.kea_table}`   : 'Kea — (not present)';
  document.getElementById('lbl-swift').textContent = mapping.swift_table ? `Swift — ${mapping.swift_table}` : 'Swift — (not present)';

  const originalText  = mapping.kea_schema   || '';
  const modifiedText  = mapping.swift_schema  || '';

  if (diffEditor) {
    diffEditor.getModel().original.setValue(originalText);
    diffEditor.getModel().modified.setValue(modifiedText);
  } else {
    // First render — clear placeholder and build editor
    editorContainer.innerHTML = '';

    require(['vs/editor/editor.main'], () => {
      diffEditor = monaco.editor.createDiffEditor(editorContainer, {
        theme: 'vs-dark',
        readOnly: true,
        renderSideBySide: true,
        fontSize: 12,
        lineNumbers: 'off',
        minimap: { enabled: false },
        scrollBeyondLastLine: false,
        wordWrap: 'on',
        diffWordWrap: 'on',
        renderOverviewRuler: false,
        scrollbar: { vertical: 'auto', horizontal: 'auto' },
        automaticLayout: true,
      });

      diffEditor.setModel({
        original: monaco.editor.createModel(originalText, 'pgsql'),
        modified: monaco.editor.createModel(modifiedText, 'pgsql'),
      });

      // Force Monaco to fill the container after the DOM has settled
      requestAnimationFrame(() => diffEditor.layout());
    });
  }
}

// ── Init ───────────────────────────────────────────────────────────────────
(async () => {
  try {
    const data = await loadData();
    buildNav(data.mappings, renderDiff);

    document.getElementById('search').addEventListener('input', e => {
      filterNav(e.target.value);
    });
  } catch (err) {
    document.getElementById('nav').innerHTML = `<div class="section-label" style="color:#f85149">${err.message}</div>`;
    console.error(err);
  }
})();
</script>
